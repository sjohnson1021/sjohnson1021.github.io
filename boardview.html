    const pinsLayer = layerContainers[PINS];
    if (!pinsLayer) return;
    
    const partContainer = pinsLayer.children.find(c => c.label === partName);
    if (partContainer && partContainer.children.length > 0) {

      // --- Feature 1: Auto-flip if target is on the hidden board side ---
      if (window.isFolded) {
        const targetIsTop = partContainer.isTopSideGroup;
        if (targetIsTop !== window.boardSideFlipped) {
          window.boardSideFlipped = targetIsTop;
          updateFlipState(); // updates renderable, mirrors scale
        }
      }

      let focusGlobalPos;
      let glowRadius;
      let targetObj = null; // The exact PIXI object to accent-tint

      if (pinName) {
        // Jump to a specific pin — use its bounds directly
        const found = partContainer.children.find(c => c.pinName === pinName);
        targetObj = found || partContainer.children[0];
        const bounds = targetObj.getLocalBounds();
        const localCenter = new PIXI.Point(bounds.x + bounds.width / 2, bounds.y + bounds.height / 2);
        focusGlobalPos = targetObj.toGlobal(localCenter);
        glowRadius = Math.max(bounds.width, bounds.height, 80) * 2.0;
      } else {
        // Jump to a whole part — compute aggregate AABB across all children
        let bMinX = Infinity, bMaxX = -Infinity, bMinY = Infinity, bMaxY = -Infinity;
        for (const child of partContainer.children) {
          try {
            const b = child.getLocalBounds();
            const tl = child.toGlobal(new PIXI.Point(b.x, b.y));
            const br = child.toGlobal(new PIXI.Point(b.x + b.width, b.y + b.height));
            bMinX = Math.min(bMinX, tl.x, br.x);
            bMaxX = Math.max(bMaxX, tl.x, br.x);
            bMinY = Math.min(bMinY, tl.y, br.y);
            bMaxY = Math.max(bMaxY, tl.y, br.y);
          } catch(_) {}
        }
        if (bMinX === Infinity) return;
        focusGlobalPos = new PIXI.Point((bMinX + bMaxX) / 2, (bMinY + bMaxY) / 2);
        glowRadius = Math.max((bMaxX - bMinX), (bMaxY - bMinY), 80) * 1.2;
        // Use first pin as accent target when jumping to a part
        targetObj = partContainer.children.find(c => c.pinName) || partContainer.children[0];
      }

      // --- Visual highlight and Details Panel update ---
      // We call toggleHighlight with a synthetic event so the Details Panel content refreshes!
      toggleHighlight({ target: targetObj, global: focusGlobalPos }, true);
      
      const screenX = app.screen.width / 2;
      const screenY = app.screen.height / 2;
      mainGroup.x += screenX - focusGlobalPos.x;
      mainGroup.y += screenY - focusGlobalPos.y;

      // Re-evaluate global position after camera move
      const mainGroupLocalCenter = mainGroup.toLocal(new PIXI.Point(screenX, screenY));

      // Visual emphasis: pulsing ring centered on target
      const glow = new PIXI.Graphics();
      glow.circle(0, 0, glowRadius)
        .stroke({ width: 8, color: TARGET_ACCENT_COLOR, alpha: 1.0 })
        .fill({ color: TARGET_ACCENT_COLOR, alpha: 0.18 });
      glow.position.set(mainGroupLocalCenter.x, mainGroupLocalCenter.y);
      glow.eventMode = 'none';
      glow.zIndex = 9999;
      mainGroup.sortableChildren = true;
      mainGroup.addChild(glow);
      
      let frame = 0;
      const duration = 70;
      const tween = () => {
        frame++;
        if (frame <= duration) {
           const progress = frame / duration;
           const easeOut = 1 - Math.pow(1 - progress, 3);
           glow.alpha = 1.0 - easeOut;
           glow.scale.set(1 + easeOut * 3.5);
        } else {
           if (!glow.destroyed) {
              mainGroup.removeChild(glow);
              glow.destroy();
           }
           app.ticker.remove(tween);
        }
      };
      app.ticker.add(tween);

      // Culling checkpoint after camera repositioning
      scheduleCulling();
    }
  });

  // Keep via and part text labels upright regardless of board rotation/flip.
  // PERF: Only run the loop when rotation or flip state actually changes.
  app.ticker.add(() => {
    if (!mainGroup) return;
    const rot = -mainGroup.rotation;
    const flipped = mainGroup.scale.x < 0;

    // Skip entirely when nothing changed since last frame
    if (rot === _lastTickerRot && flipped === _lastTickerFlip) return;
    _lastTickerRot = rot;
    _lastTickerFlip = flipped;

    // Vias
    if (viaTextContainers.length) {
      for (const text of viaTextContainers) {
        if (!text.visible) continue;
        text.rotation = flipped ? -rot : rot;
        text.scale.x = flipped ? -Math.abs(text.scale.y) : Math.abs(text.scale.y);
      }
    }
    
    // Part labels
    if (partLabelContainers.length) {
      for (const group of partLabelContainers) {
        if (!group.visible) continue;
        group.rotation = flipped ? -rot : rot;
        group.scale.x = flipped ? -Math.abs(group.scale.y) : Math.abs(group.scale.y);
      }
    }
  });

  return true;
}

const onResize = () => {
  backdrop.hitArea = globalThis.__PIXI_APP__.screen;
};

function renderVias(vias, mapX, mapY, layerContainers, layerGraphics, layerColors, style, displayMap,
  SILKSCREEN, OUTLINE, PINS, PART_OUTLINES, mainGroup, viaContainers, viaTextContainers,
  net_index_to_name, showViaNumbers, scale) {
  
  const viaMetadata = new Array(vias.length);
  const isNetNameMap = net_index_to_name instanceof Map;
  
  // Batch create or get layers for vias
  const viaLayersSet = new Set();
  vias.forEach(v => {
    viaLayersSet.add(v.layer_a_index);
    viaLayersSet.add(v.layer_b_index);
  });
  
  for (const layer of viaLayersSet) {
    if (!layerContainers[layer]) createLayerContainers(layer, layerContainers, layerGraphics, layerColors, style,
      SILKSCREEN, OUTLINE, PINS, PART_OUTLINES, mainGroup);
  }

  // Draw each via individually to avoid massive monolithic Graphics object bottlenecks
  for (let i = 0; i < vias.length; i++) {
    const v = vias[i];
    const isTop = v.isTopSideGroup || false;
    const cx = mapX(v.x);
    const cy = mapY(v.y);
    const rOuter = v.outer_radius * scale;
    const rInner = v.inner_radius * scale;
    const netId = v.net_index || 0;
    const netName = isNetNameMap 
      ? net_index_to_name.get(netId) 
      : net_index_to_name[netId] || "";
    
    const meta = { cx, cy, rOuter, rInner, netId, netName, layer_a_index: v.layer_a_index, layer_b_index: v.layer_b_index, isTopSideGroup: isTop };
    viaMetadata[i] = meta;
    
    // Outer ring
    const ringGraphic = new PIXI.Graphics({ cursor: 'pointer', eventMode: 'static', label: 'viaOuterRing' });
    ringGraphic.isTopSideGroup = isTop;
    ringGraphic.circle(cx, cy, rOuter).fill({ color: 0xffffff, alpha: 0.4 });
    ringGraphic.alpha = opacities.vias;
    ringGraphic.baseAlpha = opacities.vias;
    ringGraphic.isViaOuterRing = true;

    // Direct interaction handling (O(1) hit testing via PIXI scene graph)
    ringGraphic.on('pointertap', (event) => {
      toggleHighlight({ 
        currentTarget: { netId: meta.netId, netName: meta.netName, isVia: true, viaData: meta },
        global: event.global
      });
    });
    ringGraphic.on('pointerover', (event) => {
      const title = meta.netName ? `Via: ${meta.netName} (Net ${meta.netId})` : `Via: Net ${meta.netId}`;
      showTooltip(title, event.clientX, event.clientY);
    });
    ringGraphic.on('pointerout', hideTooltip);

    mainGroup.addChild(ringGraphic);
    viaContainers.push(ringGraphic);
    
    // Render arcs on both layers
    const sides = [{ side: -1, layer: v.layer_a_index }, { side: 1, layer: v.layer_b_index }];
    for (const { side, layer } of sides) {
      const colorNum = layerColors[layer]?.num || 0x888888;
      const startAngle = side === 1 ? -Math.PI / 2 : Math.PI / 2;
      const endAngle = side === 1 ? Math.PI / 2 : Math.PI * 1.5;
      
      const arcGraphic = new PIXI.Graphics({ eventMode: 'none', label: 'viaArc' });
      arcGraphic.isTopSideGroup = isTop;
      
      arcGraphic.moveTo(cx + rInner * Math.cos(startAngle), cy + rInner * Math.sin(startAngle));
      arcGraphic.arc(cx, cy, rInner, startAngle, endAngle, false);
      arcGraphic.lineTo(cx, cy);
      arcGraphic.closePath();
      arcGraphic.fill({ color: 0xFFFFFF });
      
      arcGraphic.tint = colorNum;
      arcGraphic.alpha = opacities.vias;
      arcGraphic.baseAlpha = opacities.vias;
      
      if (layerContainers[layer]) {
        layerContainers[layer].addChild(arcGraphic);
        viaContainers.push(arcGraphic);
      }
    }
  }
  
  if (showViaNumbers) {
    // Minimum screen-space via radius before we bother rendering text — avoids thousands
    // of invisible canvas contexts on dense boards (same approach as OpenBoardView LOD culling)
    const MIN_VIA_TEXT_RADIUS = 8;
    const styleCache = new Map();
    for (let i = 0; i < viaMetadata.length; i++) {
      const meta = viaMetadata[i];
      const v = vias[i];
      const { cx, cy, rInner, isTopSideGroup } = meta;
      if (rInner < MIN_VIA_TEXT_RADIUS) continue; // skip microscopic vias
      const sides = [{ side: -1, layer: v.layer_a_index }, { side: 1, layer: v.layer_b_index }];
      
      const fontSizeKey = Math.round(rInner * 0.95 * 10) / 10;
      let viaStyle = styleCache.get(fontSizeKey);
      if (!viaStyle) {
        viaStyle = new PIXI.TextStyle({ fontSize: fontSizeKey, fill: 0xffffff, align: 'center' });
        styleCache.set(fontSizeKey, viaStyle);
      }
      
      for (const { side, layer } of sides) {
        const label = displayMap[layer] ?? layer;
        const text = new PIXI.Text({ text: label.toString(), style: viaStyle });
        text.x = cx + (side * rInner) / 2;
        text.y = cy;
        text.anchor.set(0.5);
        text.isTopSideGroup = isTopSideGroup;
        text.label = 'viaTextLabel';
        
        mainGroup.addChild(text);
        viaTextContainers.push(text);
        viaContainers.push(text); // Add to viaContainers for culling/flipping
      }
    }
  }
  
  if (!window.boardMetadata) window.boardMetadata = {};
  window.boardMetadata.vias = viaMetadata;
}

function createLayerContainers(layer, layerContainers, layerGraphics, layerColors, style,
  SILKSCREEN, OUTLINE, PINS, PART_OUTLINES, mainGroup) {
  const newContainer = new PIXI.Container({ label: `layer${layer}`, eventMode: 'passive' });
  const newGraphics = new PIXI.Graphics({ label: `layerGraphics${layer}`, eventMode: 'passive' });
  layerContainers[layer] = newContainer;
  layerGraphics[layer] = newGraphics;
  
  
  const savedColor = savedSettings.layerColors[layer];
  const cssColor = savedColor ? savedColor :
    (layer === SILKSCREEN) ? normalizeCssHex(style.getPropertyValue('--silkscreen').trim()) :
    (layer === OUTLINE) ? normalizeCssHex(style.getPropertyValue('--outline').trim()) :
    (layer === PINS) ? normalizeCssHex(style.getPropertyValue('--pins').trim()) :
    (layer === PART_OUTLINES) ? normalizeCssHex(style.getPropertyValue('--part-outlines').trim()) :
    normalizeCssHex(style.getPropertyValue(`--layer-${layer % 13}`).trim());
  const layerColorNum = colorToNumber(cssColor);
  layerColors[layer] = { num: layerColorNum, css: cssColor };
  
  newContainer.addChild(newGraphics);
  mainGroup.addChild(newContainer);
}

// ---------------------------------------------------------------------------
// evaluateCulling — viewport-bounds + lightweight LOD
// Called only at deterministic checkpoints (never per-frame).
// Conservative: on any bounds failure, defaults to renderable = true.
// ---------------------------------------------------------------------------
// Reusable Rectangle to avoid per-call allocations in culling
const _cullTempRect = new PIXI.Rectangle();

function evaluateCulling() {
  if (!app || !mainGroup) return;
  const screen = app.screen;
  const MIN_SCREEN_PX = 4; // hide containers smaller than 4px on screen (pure LOD; reversible)
  const MIN_LABEL_SCREEN_PX = 12; // hide labels smaller than 12px (unreadable anyway)

  const checkContainer = (c, isLabel = false) => {
    if (!c || !c.visible) return;
    try {
      const b = c.getBounds(false, _cullTempRect);
      const minPx = isLabel ? MIN_LABEL_SCREEN_PX : MIN_SCREEN_PX;
      const tooSmall = (b.width < minPx && b.height < minPx);
      const offScreen = (b.right < 0 || b.left > screen.width || b.bottom < 0 || b.top > screen.height);
      c.renderable = !(tooSmall || offScreen);
    } catch(_) {
      c.renderable = true; // safe default
    }
  };

  // PERF: Skip layer containers — they span the entire board and calling getBounds()
  // on them traverses all children. They're always on-screen when the board is visible.
  // Only cull individual via containers and part label containers.
  for (const c of viaContainers) {
    const isLabel = c.label && c.label.startsWith('viaTextLabels');
    checkContainer(c, isLabel);
  }
  for (const c of partLabelContainers) {
    checkContainer(c, true);
  }
}

/** Schedule a culling evaluation on the next animation frame (deduplicated). */
function scheduleCulling() {
  if (pendingCullRaf !== null) return;
  pendingCullRaf = requestAnimationFrame(() => {
    pendingCullRaf = null;
    evaluateCulling();
  });
}

// Sticky tooltip for mobile: stores last hovered element for tap-to-show
let stickyTooltipEl = null;
let stickyTooltipVisible = false;

function toggleStickyTooltip(text, x, y) {
  if (!tooltipEl) return;
  if (stickyTooltipVisible && tooltipEl.dataset.stickyText === text) {
    hideTooltip();
    stickyTooltipVisible = false;
    tooltipEl.dataset.stickyText = '';
  } else {
    showTooltip(text, x, y);
    stickyTooltipVisible = true;
    tooltipEl.dataset.stickyText = text;
  }
}

function clearStickyTooltip() {
  if (stickyTooltipVisible) {
    hideTooltip();
    stickyTooltipVisible = false;
    tooltipEl.dataset.stickyText = '';
  }
}

function toggleHighlight(event, isSynthetic = false) {
  if (!isSynthetic && interactionManager?.shouldIgnoreTap()) return;
  if (event?.data?.button === 1) return;

  const hit = event?.target || event?.currentTarget;
  
  if (hit === backdrop && event.data?.originalEvent?.shiftKey) {
     const globalPos = event.global;
     if (window.scale && boardCenterX !== undefined && boardCenterY !== undefined && mainGroup) {
       const localPos = mainGroup.toLocal(globalPos);
       const rawX = ((localPos.x / window.scale) + boardCenterX);
       const rawY = (boardCenterY - (localPos.y / window.scale));
       
       const id = 'ff_' + Date.now();
       openAnnotationModal(null, null, null, null, () => {
         renderFreeformAnnotations();
       }, id, rawX, rawY);
     }
     return;
  }
  
  if (hit?.isFreeform) return;

  const clickedNetID = hit?.netId ?? null;
  
  // Try to find partName on the hit object or its parent
  let clickedPartName = hit?.partName || hit?.parent?.partName || null;
  if (!clickedPartName && hit?.parent?.label && hit.parent.label !== "Pins" && (!hit.parent.label.startsWith("layer"))) {
      clickedPartName = hit.parent.label;
  }

  // --- Pre-compute the closest segment for trace hits so we can use it in isDeselect ---
  let precomputedSegment = null;
  if (hit?.isTraceGraphic && hit.chains && event?.global) {
    let rawX, rawY;
    if (window.scale && boardCenterX !== undefined && boardCenterY !== undefined && mainGroup) {
      const localPos = mainGroup.toLocal(event.global);
      rawX = ((localPos.x / window.scale) + boardCenterX);
      rawY = (boardCenterY - (localPos.y / window.scale));
    }
    if (rawX !== undefined) {
      const pToLineDist = (px, py, x1, y1, x2, y2) => {
        const l2 = (x2 - x1) ** 2 + (y2 - y1) ** 2;
        if (l2 === 0) return Math.hypot(px - x1, py - y1);
        let t = ((px - x1) * (x2 - x1) + (py - y1) * (y2 - y1)) / l2;
        t = Math.max(0, Math.min(1, t));
        return Math.hypot(px - (x1 + t * (x2 - x1)), py - (y1 + t * (y2 - y1)));
      };
      let minDist = Infinity;
      for (const chain of hit.chains) {
        for (const seg of chain) {
          if (seg.p1 && seg.p2) {
            const d = pToLineDist(rawX, rawY, seg.p1[0], seg.p1[1], seg.p2[0], seg.p2[1]);
            if (d < minDist) { minDist = d; precomputedSegment = seg; }
          }
        }
      }
    }
  }

  // Deselect only when clicking the exact same element (and same segment for traces).
  // Previously this fired for any click on the same net — now it requires object identity.
  const isEmptyClick = (clickedNetID === null && clickedPartName === null);
  const isSameObject = (hit === highlightedTargetObj);
  const isSameSegment = !hit?.isTraceGraphic || (precomputedSegment === highlightedSegmentData);
  const isDeselect = isEmptyClick || (isSameObject && isSameSegment);

  if (isDeselect) {
      if (missedClicks < 1 && isEmptyClick) {
        missedClicks++;
      } else {
        applyHighlightToObjects(netObjectsMap, highlightFilter, null, null, null);
        highlightedNetId = null;
        highlightedPartName = null;
        highlightedTargetObj = null;
        highlightedSegmentData = null;
        missedClicks = 0;
        clearStickyTooltip();
        hideDetailsPanel();
        if (window.activeSegmentHighlight) {
            window.activeSegmentHighlight.destroy();
            window.activeSegmentHighlight = null;
        }
        if (window.activeViasHighlight) {
            window.activeViasHighlight.destroy();
            window.activeViasHighlight = null;
        }
        for (const container of viaContainers) {
            container.alpha = container.baseAlpha !== undefined ? container.baseAlpha : 0.75;
            container.blendMode = 'normal';
        }
      }
    }
   else {
    missedClicks = 0;
    highlightedNetId = clickedNetID;
    highlightedPartName = clickedPartName;
    highlightedTargetObj = hit;
    // Pass hit as the accent target — this is the specific object the user clicked
    applyHighlightToObjects(netObjectsMap, highlightFilter, clickedNetID, clickedPartName, hit);

    // Show details panel logic
    const globalPos = event?.global;
    if (globalPos) {
      const partName = clickedPartName;
      const netName = hit?.netName || null;
      const netId = clickedNetID;

      // Get parts on net
      let partsOnNet = [];
      if (netId !== null && netObjectsMap[netId]) {
        const partsSet = new Map();
        netObjectsMap[netId].forEach(obj => {
           let part = obj.partName || (obj.parent && obj.parent.partName) || null;
           if (!part && obj.parent && obj.parent.label && obj.parent.label !== "Pins" && !obj.parent.label.startsWith("layer")) {
               part = obj.parent.label;
           }
           let pin = obj.pinName || null;
           
           if (part && obj !== hit) {
               const key = pin ? `${part}:${pin}` : part;
               if (!partsSet.has(key)) {
                   partsSet.set(key, { partName: part, pinName: pin });
               }
           }
        });
        partsOnNet = Array.from(partsSet.values()).sort((a, b) => a.partName.localeCompare(b.partName));
      }

      // Calculate raw x/y
      let rawX, rawY;
      if (window.scale && boardCenterX !== undefined && boardCenterY !== undefined && mainGroup) {
        const localPos = mainGroup.toLocal(globalPos);
        rawX = ((localPos.x / window.scale) + boardCenterX);
        rawY = (boardCenterY - (localPos.y / window.scale));
      }

      // Use the pre-computed segment (already found above) for trace highlights
      if (hit?.isTraceGraphic && precomputedSegment) {
        const bestSeg = precomputedSegment;
        hit.segmentData = bestSeg;
        highlightedSegmentData = bestSeg;

        if (window.activeSegmentHighlight) {
           window.activeSegmentHighlight.destroy();
           window.activeSegmentHighlight = null;
        }

        const hl = new PIXI.Graphics();
        const mapX = x => (x - boardCenterX) * window.scale;
        const mapY = y => (boardCenterY - y) * window.scale;

        const p1X = mapX(bestSeg.p1[0]);
        const p1Y = mapY(bestSeg.p1[1]);
        const p2X = mapX(bestSeg.p2[0]);
        const p2Y = mapY(bestSeg.p2[1]);

        // Draw subtle highlight for the selected segment
        hl.moveTo(p1X, p1Y);
        hl.lineTo(p2X, p2Y);
        let w = Number(bestSeg.data.width ?? bestSeg.data.scale ?? 100);
        let strokeWidth = Math.max(4, w * window.scale * 1.5);

        hl.stroke({ width: strokeWidth, color: TARGET_ACCENT_COLOR, alpha: 0.8 });
        hl.eventMode = 'none';
        hl.zIndex = 10000;
        mainGroup.sortableChildren = true;
        mainGroup.addChild(hl);
        window.activeSegmentHighlight = hl;
      } else {
        highlightedSegmentData = null;
        if (window.activeSegmentHighlight) {
           window.activeSegmentHighlight.destroy();
           window.activeSegmentHighlight = null;
        }
      }

      // Handle Via highlighting
      if (window.activeViasHighlight) {
          window.activeViasHighlight.destroy();
          window.activeViasHighlight = null;
      }
      
      const hasTarget = netId !== null && netId !== undefined;
      const hasPart = !!partName && !hasTarget;
      
      // Dim all batched via containers
      for (const container of viaContainers) {
          container.alpha = (container.baseAlpha !== undefined ? container.baseAlpha : 0.75) * 0.4;
          container.blendMode = 'luminosity';
      }
      
      if (hasTarget && window.boardMetadata?.vias) {
          const hlVias = new PIXI.Graphics();
          const mapX = x => (x - boardCenterX) * window.scale;
          const mapY = y => (boardCenterY - y) * window.scale;
          
          for (const via of window.boardMetadata.vias) {
              if (via.netId === netId) {
                  const cx = mapX(via.cx / window.scale + boardCenterX); // via.cx was already scaled... wait. 
                  // via.cx from viaMetadata is mapped already using initial mapX. We need to recalculate or just use via's raw coords if available.
                  // Actually, viaMetadata[i] = { cx, cy, rOuter, rInner, netId... } but cx/cy were calculated with initial mapX/mapY which depend on window.scale at the time of rendering!
                  // It's better to redraw them using the current mapX/mapY, wait no, they are just added to layerContainer which is scaled by mainGroup.
                  // The cx/cy in viaMetadata are in LOCAL coordinates of the mainGroup!
                  hlVias.circle(via.cx, via.cy, via.rOuter).fill({ color: 0xFFFFFF, alpha: 0.8 });
                  hlVias.circle(via.cx, via.cy, via.rInner).fill({ color: 0x000000 });
              }
          }
          hlVias.eventMode = 'none';
          hlVias.zIndex = 10001;
          mainGroup.sortableChildren = true;
          mainGroup.addChild(hlVias);
          window.activeViasHighlight = hlVias;
      }


      showDetailsPanel(partName, netName, netId, hit, partsOnNet, rawX, rawY);
    }
  }
}
function redrawTrace(child, mapX, mapY, currentScale, windowScale) {
    child.clear();
    for (const chain of child.chains) {
        const elem = chain[0].data || {};
        let baseWidth = Number(elem.width ?? elem.scale ?? 100);
        let strokeWidth = Math.max(0.4, baseWidth * currentScale * windowScale);

        // Determine correct starting point based on traversal direction
        const first = chain[0];
        const firstPt = first.forward ? first.p1 : first.p2;
        if (firstPt) child.moveTo(mapX(firstPt[0]), mapY(firstPt[1]));
        
        for (const link of chain) {
            if (link.type === 'segment') {
                const a = link.forward ? link.p1 : link.p2;
                const b = link.forward ? link.p2 : link.p1;
                // If this segment's start doesn't connect to where the pen currently is,
                // explicitly moveTo its start to avoid skipping disconnected segments
                if (a) child.lineTo(mapX(a[0]), mapY(a[1]));
                if (b) child.lineTo(mapX(b[0]), mapY(b[1]));
            } else if (link.type === 'arc') {
                const arc = link.data;
                const a0 = (arc.angle_start / 10000) * (Math.PI/180);
                const a1 = (arc.angle_end / 10000) * (Math.PI/180);
                let start = link.forward ? a0 : a1;
                let end = link.forward ? a1 : a0;
                let delta = end - start;
                if (delta > Math.PI) delta -= 2 * Math.PI;
                if (delta < -Math.PI) delta += 2 * Math.PI;
                const maxSeg = 30;
                for (let i = 1; i <= maxSeg; i++) {
                    const t = start + (delta * (i / maxSeg));
                    const x = arc.x1 + arc.r * Math.cos(t);
                    const y = arc.y1 + arc.r * Math.sin(t);
                    child.lineTo(mapX(x), mapY(y));
                }
            }
        }
        child.stroke({ width: strokeWidth, color: 0xFFFFFF, cap: 'round', join: 'round' });
    }
}

function updateDynamicWidths(mapX, mapY, windowScale) {
    const { SILKSCREEN, OUTLINE, PART_OUTLINES } = LAYER_IDS;
    for (const layer in layerContainers) {
        const lNum = Number(layer);
        let currentScale = traceWidthScale;
        if (lNum === SILKSCREEN) currentScale = silkscreenWidthScale;
        else if (lNum === OUTLINE) currentScale = boardOutlineWidthScale;

        const container = layerContainers[layer];
        if (!container) continue;

        for (const child of container.children) {
            if (child.isTraceGraphic && child.chains) {
                redrawTrace(child, mapX, mapY, currentScale, windowScale);
            }
            if (lNum === PART_OUTLINES) {
                if (child.isPartOutline && child.partLines) {
                    child.clear();
                    for (const line of child.partLines) {
                        child.moveTo(mapX(line.x1), mapY(line.y1));
                        child.lineTo(mapX(line.x2), mapY(line.y2));
                        child.stroke({ width: line.baseWidth * partOutlineWidthScale, color: 0xFFFFFF, cap: 'round', join: 'round' });
                    }
                }
            }
        }
    }
}

function renderFreeformAnnotations() {
  if (!freeformContainer || !mainGroup || !window.scale) return;
  freeformContainer.removeChildren();
  
  const notes = getAllFreeformNotes();
  const mapX = window.mapXCache;
  const mapY = window.mapYCache;
  if (!mapX || !mapY) return;

  notes.forEach(note => {
    const { id, x, y, title, text, color } = note;
    const cx = mapX(x);
    const cy = mapY(y);
    
    const dot = new PIXI.Graphics({ label: `freeform_${id}`, eventMode: 'dynamic' });
    const cssColor = color || '#38bdf8';
    
    // Adjust size dynamically, but keep it easily interactable
    const rad = Math.max(200 * window.scale, 8); 
    
    dot.circle(0, 0, rad).fill({ color: colorToNumber(cssColor) });
    dot.stroke({ width: Math.max(40 * window.scale, 10), color: 0xFFFFFF });
    dot.position.set(cx, cy);
    
    dot.isFreeform = true;
    dot.freeformId = id;
    dot.freeformX = x;
    dot.freeformY = y;
    dot.freeformTitle = title;
    dot.freeformText = text;
    
    dot.on('pointerdown', (e) => {
      // Prevent selection of parts if clicking dot
      e.stopPropagation();
    });
    
    dot.on('pointerover', (e) => {
        showTooltip(title ? `Note: ${title}` : 'Note', e.clientX, e.clientY);
    });
    dot.on('pointermove', (e) => moveTooltip(e.clientX, e.clientY));
    dot.on('pointerout', hideTooltip);
    
    freeformContainer.addChild(dot);
  });
}

// ---------------------------------------------------------------------------
// buildComponentGroups — extracted from renderSegments for clarity and testability.
// Iterates over all DATA blocks and builds pin, outline, and label PIXI objects
// for each component, adding them to pinsOverlay and layerContainers[PART_OUTLINES].
// ---------------------------------------------------------------------------
function buildComponentGroups({
  type07Blocks, pinsOverlay, layerContainers, layerColors, net_index_to_name,
  netObjectsMap, opacities, style, mapX, mapY, partLabelContainers,
  showPartLabels, partLabelScale, partOutlineWidthScale,
  toggleHighlight, showTooltip, moveTooltip, hideTooltip, toggleStickyTooltip,
  diodeReadings,
}) {
  const pinColor       = colorToNumber(style.getPropertyValue('--pins').trim());
  const groundColor    = colorToNumber(style.getPropertyValue('--ground').trim());
  const ncColor        = colorToNumber(style.getPropertyValue('--nc').trim());
  const silkscreenTint = layerColors[SILKSCREEN]?.num || 0xFFFFFF;
  const partOutlineColor = layerColors[PART_OUTLINES]?.num || 0xFF6B35;
  const outlineLayer   = layerContainers[PART_OUTLINES];

  // Optimization: Extract expensive object creation, checks, and globals out of loops
  const isNetMap = net_index_to_name instanceof Map;
  const getNetName = isNetMap 
    ? (id) => net_index_to_name.get(id) || ''
    : (id) => net_index_to_name[id] || '';
  
  const winScale = window.scale;
  const textStyle = getPartLabelTextStyle();

  // Pre-calculate derived variables to avoid recomputation in loops
  const poWidthScale = partOutlineWidthScale;
  const poAlpha = opacities.part_outlines;
  const poNcAlpha = poAlpha * 0.4;
  const pLabelsAlpha = opacities.partLabels;
  const pAlpha = opacities.pins;

  for (let i = 0; i < type07Blocks.length; i++) {
    const block = type07Blocks[i];
    const parsedData = block.DATA?.parsed_data || block.DATA;
    if (!parsedData) continue;

    // Normalize sub-blocks for both data formats using fast arrays
    if (!parsedData.sub_blocks && parsedData.subtype09) {
      const subBlocks = [];
      if (parsedData.subtype05) {
        for (let j = 0; j < parsedData.subtype05.length; j++) {
          const t = parsedData.subtype05[j];
          t.type = 'sub_type_05';
          subBlocks.push(t);
        }
      }
      if (parsedData.subtype06) {
        for (let j = 0; j < parsedData.subtype06.length; j++) {
          const t = parsedData.subtype06[j];
          t.type = 'sub_type_06';
          subBlocks.push(t);
        }
      }
      subBlocks.push({ type: 'sub_type_09', pins: parsedData.subtype09 });
      parsedData.sub_blocks = subBlocks;
    } else if (!parsedData.sub_blocks) {
      continue;
    }

    let partName = '';
    const subBlocks = parsedData.sub_blocks;
    for (let j = 0; j < subBlocks.length; j++) {
      const subBlock = subBlocks[j];
      if (subBlock.type === 'sub_type_06' && (subBlock.label || subBlock.type_06_label)) {
        partName = subBlock.label || subBlock.type_06_label;
        break;
      }
    }
    
    const isNC = partName.toUpperCase().endsWith('NC');
    const partContainer = new PIXI.Container({ label: 'partContainer', eventMode: 'passive' });
    partContainer.isTopSideGroup = block.DATA?.isTopSideGroup || false;

    const outlineGraphics = new PIXI.Graphics({});
    outlineGraphics.isPartOutline = true;
    outlineGraphics.partLines = [];

    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    const pendingTexts = [];

    let hoverTokens = 0;
    let unhoverTimeout = null;
    let partLabelGroup = null; // set later when label is built
    
    function setHover(state) {
        if (state) {
            hoverTokens++;
            if (unhoverTimeout) { clearTimeout(unhoverTimeout); unhoverTimeout = null; }
            if (outlineGraphics.hoverFill) outlineGraphics.hoverFill.visible = true;
            if (partContainer.parent) partContainer.parent.addChild(partContainer);
            if (outlineLayer && outlineGraphics.partLines.length > 0) {
                if (outlineGraphics.parent) outlineGraphics.parent.addChild(outlineGraphics);
            }
            // Dim label so pins underneath are more visible
            if (partLabelGroup) partLabelGroup.alpha = 0.3;
        } else {
            hoverTokens = Math.max(0, hoverTokens - 1);
            if (hoverTokens === 0) {
                unhoverTimeout = setTimeout(() => {
                    if (hoverTokens === 0) {
                        if (outlineGraphics.hoverFill) outlineGraphics.hoverFill.visible = false;
                        // Restore label opacity
                        if (partLabelGroup) partLabelGroup.alpha = partLabelGroup.baseAlpha ?? pLabelsAlpha;
                    }
                }, 50);
            }
        }
    }

    let hasOutlines = false;

    for (let j = 0; j < subBlocks.length; j++) {
      const subBlock = subBlocks[j];
      
      // --- Part outline lines ---
      if (subBlock.type === 'sub_type_05') {
        const baseWidth = Math.max((subBlock.scale || 20000) * winScale * 5, 15);
        outlineGraphics.moveTo(mapX(subBlock.x1), mapY(subBlock.y1));
        outlineGraphics.lineTo(mapX(subBlock.x2), mapY(subBlock.y2));
        outlineGraphics.stroke({ width: baseWidth * poWidthScale, color: 0xFFFFFF, cap: 'round', join: 'round' });
        
        hasOutlines = true;
        outlineGraphics.partLines.push({ x1: subBlock.x1, y1: subBlock.y1, x2: subBlock.x2, y2: subBlock.y2, baseWidth });
        
        if (subBlock.x1 < minX) minX = subBlock.x1; if (subBlock.x1 > maxX) maxX = subBlock.x1;
        if (subBlock.x2 < minX) minX = subBlock.x2; if (subBlock.x2 > maxX) maxX = subBlock.x2;
        if (subBlock.y1 < minY) minY = subBlock.y1; if (subBlock.y1 > maxY) maxY = subBlock.y1;
        if (subBlock.y2 < minY) minY = subBlock.y2; if (subBlock.y2 > maxY) maxY = subBlock.y2;

      // --- Part label text block ---
      } else if (subBlock.type === 'sub_type_06' && (subBlock.label || subBlock.type_06_label)) {
        if (!partName) partName = subBlock.label || subBlock.type_06_label;
        pendingTexts.push({
          str: subBlock.label || subBlock.type_06_label,
          x: subBlock.x || subBlock.x1 || 0,
          y: subBlock.y || subBlock.y1 || 0,
          rotDeg: -((subBlock.rotation || 0) / 10000),
          scaleOffset: subBlock.scale || 20000,
        });

      // --- Pins ---
      } else if (subBlock.type === 'sub_type_09') {
        const pins = subBlock.pins;
        for (let k = 0; k < pins.length; k++) {
          const pin = pins[k];
          if (pin.x < minX) minX = pin.x; if (pin.x > maxX) maxX = pin.x;
          if (pin.y < minY) minY = pin.y; if (pin.y > maxY) maxY = pin.y;

          const pinGraphic = new PIXI.Graphics({ label: 'pinGraphic', cursor: 'default', eventMode: 'static' });
          const netId = pin.net_index || pin.pad_number || 0;
          pinGraphic.netId = netId;
          pinGraphic.pinName = pin.pad_number ? String(pin.pad_number) : (pin.name || pin.number || null);
          pinGraphic.isThruHole = pin.isThruHole_pin || false;
          pinGraphic.innerDiameter = pin.inner_diameter || 0;
          pinGraphic.outerShape = pin.width; // rough approx of diameter since we lack pure diameter field globally
          
          const netName = getNetName(netId);
          pinGraphic.netName = netName;

          const tintColor = netName === 'GND' ? groundColor
            : netName === 'NC' ? ncColor : pinColor;

          if (!netObjectsMap[netId]) netObjectsMap[netId] = [];
          netObjectsMap[netId].push(pinGraphic);

          drawOptimizedPin(pinGraphic, pin, mapX(pin.x), mapY(pin.y), winScale, 0xFFFFFF);
          pinGraphic.tint      = tintColor;
          pinGraphic.color     = tintColor;
          pinGraphic.alpha     = pAlpha;
          pinGraphic.baseAlpha = pAlpha;
          pinGraphic.partName  = partName;

          pinGraphic.on('pointertap', (e) => {
            if (e.pointerType === 'touch') {
              const text = partName
                ? `${partName} — ${netName || 'Net ' + netId}`
                : (netName ? `Pin: ${netName}` : `Pin: Net ${netId}`);
              toggleStickyTooltip(text, e.clientX, e.clientY);
            }
            toggleHighlight(e);
          });
          pinGraphic.on('pointerover', (e) => {
            if (e.pointerType === 'touch') return;
            setHover(true);
            const pinNum = pinGraphic.pinName ? `Pin: ${pinGraphic.pinName}` : '';
            let tt = netName ? `${netName}` : `Net ${netId}`;
            if (partName) tt = `${partName} - ${pinNum} - ${tt}`;
            // Append diode/probe reading: prefer pin-level, fall back to any reading on the same net
            const reading = diodeReadings?.get(partName)?.get(pinGraphic.pinName)
              ?? window.boardMetadata?.netReadingsMap?.get(netId);
            if (reading) tt += ` [${reading.displayValue}]`;
            showTooltip(tt, e.clientX, e.clientY);
          });
          // PERF: tooltip repositioning handled by single stage-level pointermove handler
          pinGraphic.on('pointerout',  (e) => { 
            if (e.pointerType !== 'touch') hideTooltip(); 
            setHover(false);
          });

          partContainer.addChild(pinGraphic);
        }
      }
    }
    
    if (hasOutlines) {
        outlineGraphics.tint = isNC ? 0x888888 : partOutlineColor;
        outlineGraphics.alpha = isNC ? poNcAlpha : poAlpha;
        outlineGraphics.baseAlpha = outlineGraphics.alpha;
    }

    // --- Render part label (deferred until bounds are known) ---
    if (pendingTexts.length > 0) {
      pendingTexts.sort((a, b) => b.scaleOffset - a.scaleOffset);
      const primaryText = pendingTexts[0];
      
      let cx = primaryText.x, cy = primaryText.y, width = 0, height = 0;
      if (minX !== Infinity) {
        cx = (minX + maxX) / 2;
        cy = (minY + maxY) / 2;
        width  = (maxX - minX) * winScale;
        height = (maxY - minY) * winScale;
      }

      // PERF + UX: eventMode 'none' makes labels fully transparent to pointer events
      // so they never block pin/part selection underneath.
      const labelGroup = new PIXI.Container({ label: 'labelGroup', eventMode: 'none' });
      labelGroup.position.set(mapX(cx), mapY(cy));

      let currentYOffset = 0;
      let maxBgWidth = 0;
      let totalBgHeight = 0;
      const textsToDraw = [];
      const isTestPad = partName && partName.startsWith('TP');
      labelGroup.isTestPadLabel = isTestPad;

      for (let k = 0; k < pendingTexts.length; k++) {
        const textItem = pendingTexts[k];
        const textGraphic = new PIXI.Text({ text: textItem.str, style: textStyle });
        textGraphic.anchor.set(0.5, 0); // anchor top-center

        let labelScale = 1.0;
        // Calculate the scale requested by the file, normalized and bumped up a bit for readability
        // 6.75 multiplier bumps sizes up slightly for all components including BGA ICs
        const requestedScale = Math.max(textItem.scaleOffset * winScale * 6.75, 35) / 64;

        if (width > 0 && height > 0 && !isTestPad) {
          const tw = textGraphic.width, th = textGraphic.height;
          // Calculate max scale to keep it inside the component bounding box (with minimal padding to allow larger labels)
          const maxScale = Math.min((width * 0.9) / tw, (height * 0.9) / th);
          
          // Allow label to dynamically expand up to 75% of the bounding box, overriding small requestedScales on huge components
          const dynamicScale = Math.max(requestedScale, maxScale * 0.75);
          
          // Clamp to maxScale to ensure it never bleeds out of the bounding box
          labelScale = Math.min(dynamicScale, maxScale);
          if (tw * labelScale < 5) labelScale = 0; 
        } else {
          // Fallback or Test Pad: test pads often don't have distinct bounds since they are just pins/vias
          labelScale = requestedScale;
          if (isTestPad && labelScale < 0.3) labelScale = 0; // enforce a minimum text size relative to base
        }

        if (labelScale > 0) {
          textGraphic.scale.set(labelScale, labelScale);
          textGraphic.tint = isNC ? 0x888888 : silkscreenTint;
          textGraphic.alpha = isNC ? 0.6 : 1.0;
          textGraphic.y = currentYOffset;

          textsToDraw.push(textGraphic);

          const th = textGraphic.height;
          const tw = textGraphic.width;
          if (tw > maxBgWidth) maxBgWidth = tw;
          totalBgHeight = currentYOffset + th;
          currentYOffset += th + (2 * labelScale); 
        }
      }

      if (textsToDraw.length > 0) {
        const padding = 2;
        const bgRect = new PIXI.Graphics();
        bgRect.roundRect(-maxBgWidth / 2 - padding, -padding, maxBgWidth + padding * 2, totalBgHeight + padding * 2, 4);
        bgRect.fill({ color: 0x000000, alpha: 0.7 });

        if (primaryText.rotDeg !== 0) {
            labelGroup.rotation = primaryText.rotDeg * (Math.PI / 180);
        }

        bgRect.y = -totalBgHeight / 2;
        for (let m = 0; m < textsToDraw.length; m++) {
            const tg = textsToDraw[m];
            tg.y -= totalBgHeight / 2;
            labelGroup.addChild(tg);
        }

        labelGroup.addChildAt(bgRect, 0);
        labelGroup.alpha     = pLabelsAlpha;
        labelGroup.baseAlpha = pLabelsAlpha;
        labelGroup.visible   = showPartLabels;

        labelGroup.scale.x = partLabelScale;
        labelGroup.scale.y = partLabelScale;
        partContainer.addChild(labelGroup);
        partLabelContainers.push(labelGroup);
        partLabelGroup = labelGroup; // expose to setHover closure for dimming
      }
    }

    // --- Register part outline for highlight / interaction ---
    if (outlineGraphics.partLines.length > 0) {
      if (!netObjectsMap['outlineGraphics']) netObjectsMap['outlineGraphics'] = [];
      outlineGraphics.partName     = partName;
      outlineGraphics.cursor       = 'pointer';
      outlineGraphics.eventMode    = 'static';
      outlineGraphics.isTopSideGroup = partContainer.isTopSideGroup;
      
      if (minX !== Infinity && maxX !== -Infinity && minY !== Infinity && maxY !== -Infinity) {
          const hoverFill = new PIXI.Graphics({ label: 'hoverFill' });
          const w = (maxX - minX) * winScale;
          const h = (maxY - minY) * winScale;
          hoverFill.roundRect(mapX(minX), mapY(maxY), w, h, 4).fill({ color: 0x00FFAA, alpha: 0.15 });
          hoverFill.visible = false;
          outlineGraphics.addChildAt(hoverFill, 0);
          outlineGraphics.hoverFill = hoverFill;
          outlineGraphics.hitArea = new PIXI.Rectangle(mapX(minX), mapY(maxY), w, h);
      }
      
      outlineGraphics.on('pointerover', () => {
          setHover(true);
      });
      outlineGraphics.on('pointerout', () => {
          setHover(false);
      });
      
      outlineGraphics.on('pointertap', toggleHighlight);
      netObjectsMap['outlineGraphics'].push(outlineGraphics);
      outlineLayer.addChild(outlineGraphics);
    }

    if (partName) {
      partContainer.label = partName;
      if (window.boardMetadata) {
        window.boardMetadata.components[partName] = {
           type: inferComponentType(partName),
           footprint: parsedData.header?.part_group_name || '',
           valueLabel: pendingTexts.length > 1 ? pendingTexts[1].str : '',
           rotation: pendingTexts.length > 0 ? pendingTexts[0].rotDeg : 0,
           width: minX !== Infinity ? (maxX - minX) : 0,
           height: minY !== Infinity ? (maxY - minY) : 0
        };
      }
    }
    pinsOverlay.addChild(partContainer);
  }
}

async function renderSegments(json) {
  console.time('Rendering Segments');
  const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));


  const main_data_blocks = json?.main_data_blocks || [];
  const segments = main_data_blocks.filter(d => d.SEGMENT).map(d => d.SEGMENT);
  const arcs = main_data_blocks.filter(d => d.ARC).map(d => d.ARC);
  const vias = main_data_blocks.filter(d => d.VIA).map(d => d.VIA);
  const diode_readings = json?.diode_readings || new Map();
  const reading_type = json?.reading_type || 'Diode';
  const net_index_to_name = json?.net_index_to_name || new Map();
  const controls = document.getElementById('controls');

  if ((!segments.length > 0) && (!arcs.length > 0) && (!vias.length > 0)) {
    controls.textContent = 'No drawable objects found in file.';
    return;
  }

  if (!app) {
    if (!await initPixi()) {
      controls.textContent = 'Failed to initialize PixiJS';
      return;
    }
  }

  if (progressModal.isVisible) {
    progressModal.updateProgress(35, 'Setting up rendering structure...');
    await delay(50);
  }

  mainGroup.removeChildren();
  layerGraphics = {};
  layerContainers = {};
  drawableElements = [];
  viaContainers = [];
  viaTextContainers = [];
  
  freeformContainer = new PIXI.Container({ label: 'freeformContainer' });
  freeformContainer.zIndex = 1000;
  mainGroup.addChild(freeformContainer);

  window.boardMetadata = {
    components: {},
    diodeReadings: null,
    readingType: null
  };

  const allObjects = [...segments, ...arcs, ...vias];
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

  segments.forEach(s => {
    [minX, maxX] = [Math.min(minX, s.x1, s.x2), Math.max(maxX, s.x1, s.x2)];
    [minY, maxY] = [Math.min(minY, s.y1, s.y2), Math.max(maxY, s.y1, s.y2)];
  });
  
  arcs.forEach(a => {
    [minX, maxX] = [Math.min(minX, a.x1 - a.r), Math.max(maxX, a.x1 + a.r)];
    [minY, maxY] = [Math.min(minY, a.y1 - a.r), Math.max(maxY, a.y1 + a.r)];
  });
  
  vias.forEach(v => {
    if (!v.outer_radius) {
      v.outer_radius = Math.max(v.layer_a_radius || 5000, v.layer_b_radius || 5000);
      v.inner_radius = Math.min(v.layer_a_radius || 2500, v.layer_b_radius || 2500);
    }
    [minX, maxX] = [Math.min(minX, v.x - v.outer_radius), Math.max(maxX, v.x + v.outer_radius)];
    [minY, maxY] = [Math.min(minY, v.y - v.outer_radius), Math.max(maxY, v.y + v.outer_radius)];
  });

  const rawWidth = maxX - minX, rawHeight = maxY - minY;
  boardCenterX = minX + rawWidth / 2;
  boardCenterY = minY + rawHeight / 2;

  window.scale = rawWidth >= rawHeight ? TARGET_SIZE / rawWidth : TARGET_SIZE / rawHeight;
  const normWidth = rawWidth * window.scale, normHeight = rawHeight * window.scale;

  const mapX = x => (x - boardCenterX) * window.scale;
  const mapY = y => (boardCenterY - y) * window.scale;
  
  window.mapXCache = mapX;
  window.mapYCache = mapY;

  const style = getComputedStyle(document.documentElement);

  const layers = [...new Set([
    ...segments.map(s => s.layer >= 1000 ? s.layer - 1000 : s.layer),
    ...arcs.map(a => a.layer >= 1000 ? a.layer - 1000 : a.layer),
    ...vias.flatMap(v => [v.layer_a_index, v.layer_b_index]),
    PINS,
    PART_OUTLINES
  ])].sort((a, b) => a - b);

  layers.forEach(layer => {
    const container = new PIXI.Container({ label: "layer" + layer, eventMode: 'passive' });
    layerContainers[layer] = container;
    
    const graphics = new PIXI.Graphics({ label: "layerGraphics", eventMode: 'passive' });
    layerGraphics[layer] = graphics;
    
    // Use saved color if available, otherwise fall back to CSS
    const savedColor = savedSettings.layerColors[layer];
    const cssColor = savedColor ? savedColor :
      (layer === SILKSCREEN) ? normalizeCssHex(style.getPropertyValue('--silkscreen').trim()) :
      (layer === OUTLINE) ? normalizeCssHex(style.getPropertyValue('--outline').trim()) :
      (layer === PINS) ? normalizeCssHex(style.getPropertyValue('--pins').trim()) :
      (layer === PART_OUTLINES) ? normalizeCssHex(style.getPropertyValue('--part-outlines').trim()) :
      normalizeCssHex(style.getPropertyValue(`--layer-${layer % 13}`).trim());
    
    const layerColorNum = colorToNumber(cssColor);
    layerColors[layer] = { num: layerColorNum, css: cssColor };
    
    container.addChild(graphics);
    mainGroup.addChild(container);
  });

  const unoffsetLayer = l => l >= 1000 ? l - 1000 : l;
  const populatedLayers = [...new Set([...segments.map(s => unoffsetLayer(s.layer)), ...arcs.map(a => unoffsetLayer(a.layer))])]
    .filter(l => l !== OUTLINE && l !== SILKSCREEN && l <= 16).sort((a, b) => a - b);
  
  const displayMap = Object.fromEntries(populatedLayers.map((l, i) => [l, i + 1]));
  const defaultVisible = window.userActiveLayers ? window.userActiveLayers : new Set([
    populatedLayers[0] ?? 1,
    populatedLayers[populatedLayers.length - 1] ?? 16,
    OUTLINE,
    SILKSCREEN,
    PART_OUTLINES,
    PINS
  ]);

  layers.forEach(layer => {
    if (layerContainers[layer]) {
      layerContainers[layer].visible = defaultVisible.has(layer);
    }
  });

  let workerData = null;
  if (!window.isFolded && window.cachedWorkerData_unfolded) {
      workerData = window.cachedWorkerData_unfolded;
  } else if (window.isFolded && window.cachedWorkerData_folded) {
      workerData = window.cachedWorkerData_folded;
  } else {
      workerData = await new Promise((resolve, reject) => {
        let worker;
        try {
          worker = new Worker('./js/pcb-worker.js');
        } catch (err) {
          console.error('Worker construction failed:', err);
          controls.textContent = 'Failed to start worker. See console.';
          reject(err);
          return;
        }

        worker.addEventListener('error', (e) => {
          console.error('Worker runtime error:', e);
        });

        worker.onmessage = (e) => {
          const msg = e.data;
          switch (msg.type) {
            case 'progress':
              if (progressModal.isVisible) {
                const mainThreadProgress = 35 + (msg.percent * 0.40);
                progressModal.updateProgress(mainThreadProgress, msg.stage || 'Processing...');
              }
              break;
            case 'pcb-debug-chain':
              if (window.__PCB_DEBUG__) console.debug('pcb-debug-chain', msg);
              break;
            case 'done':
              worker.terminate();
                 resolve({ optimizedPaths: msg.optimizedPaths, mergedByLayer: msg.mergedByLayer, shellHoleData: msg.shellHoleData });
              break;
            case 'error':
              console.error('Error from PCB worker:', msg.message);
              worker.terminate();
              reject(new Error(msg.message));
              break;
          }
        };

        worker.onerror = (e) => {
          console.error('Worker.onerror:', e);
          worker.terminate();
          reject(new Error(`Worker error: ${e.message || e}`));
        };

        try {
          worker.postMessage({
            type: 'process',
            json,
            centerX: boardCenterX,
            centerY: boardCenterY,
            scale: window.scale,
            traceWidthScale: traceWidthScale,
            silkscreenWidthScale: silkscreenWidthScale,
            boardOutlineWidthScale: boardOutlineWidthScale,
            useLines: true
          });
        } catch (err) {
          console.error('Failed to postMessage to worker:', err);
          worker.terminate();
          reject(err);
        }
      });
      
      if (window.isFolded) {
          window.cachedWorkerData_folded = workerData;
      } else {
          window.cachedWorkerData_unfolded = workerData;
      }
  }

//   if (!shellHoleData) return;
if (!workerData) return;
  
  const { optimizedPaths, mergedByLayer, shellHoleData } = workerData;

  if (progressModal.isVisible) {
    progressModal.updateProgress(75, 'Rendering path elements...');
    await delay(50);
  }

  if (optimizedPaths) {
    for (const layerStr in optimizedPaths) {
      const rawLayerId = Number(layerStr);
      const isTopSideGroup = rawLayerId >= 1000;
      const layer = isTopSideGroup ? rawLayerId - 1000 : rawLayerId;
      const layerContainer = layerContainers[layer];
      if (!layerContainer) continue;

      const chains = optimizedPaths[layerStr];
      const colorNum = layerColors[layer]?.num ?? 0x000000;
      const graphicsByNet = {};

      for (const chain of chains) {
        if (!chain || chain.length === 0) continue;

        let netId = chain[0].data?.net_index || 0;
        if (!graphicsByNet[netId]) {
          const traceGraphic = new PIXI.Graphics({ label: `traceGraphicNet${netId}`, cursor: "default", eventMode: 'static' });
          if (layer === SILKSCREEN) traceGraphic.isTopSideGroup = isTopSideGroup;
          traceGraphic.isTraceGraphic = true;
          traceGraphic.chains = [];
          traceGraphic.netId = parseInt(netId, 10);
          traceGraphic.netName = (net_index_to_name instanceof Map) ? net_index_to_name.get(traceGraphic.netId) : net_index_to_name[traceGraphic.netId] || "";
          
          if (!netObjectsMap[netId]) netObjectsMap[netId] = [];
          netObjectsMap[netId].push(traceGraphic);

          traceGraphic.alpha = (layer === SILKSCREEN) ? opacities.silkscreen : (layer === OUTLINE) ? opacities.outline : opacities.trace;
          traceGraphic.baseAlpha = traceGraphic.alpha;
          traceGraphic.tint = colorNum;

          traceGraphic.on('pointerover', (e) => showTooltip(traceGraphic.netName ? `Trace: ${traceGraphic.netName}` : `Trace: Net ${traceGraphic.netId}`, e.clientX, e.clientY));
          // PERF: tooltip repositioning handled by single stage-level pointermove handler
          traceGraphic.on('pointerout', hideTooltip);
          traceGraphic.on('pointertap', toggleHighlight);

          layerContainer.addChild(traceGraphic);
          graphicsByNet[netId] = traceGraphic;
        }

        graphicsByNet[netId].chains.push(chain);
      }
      
      let currentScale = traceWidthScale;
      if (layer === SILKSCREEN) currentScale = silkscreenWidthScale;
      else if (layer === OUTLINE) currentScale = boardOutlineWidthScale;
      
      for (const netId in graphicsByNet) {
          redrawTrace(graphicsByNet[netId], mapX, mapY, currentScale, window.scale);
      }
    }
  } else if (shellHoleData) {
    for (const layerStr in shellHoleData) {
      const rawLayerId = Number(layerStr);
      const isTopSideGroup = rawLayerId >= 1000;
      const layer = isTopSideGroup ? rawLayerId - 1000 : rawLayerId;
      const layerContainer = layerContainers[layer];
      if (!layerContainer) continue;

      const netMap = shellHoleData[layerStr];

      for (const netId in netMap) {
        const shapesArray = netMap[netId];

        const traceGraphic = new PIXI.Graphics({
          label: `traceGraphicNet${netId}`,
          cursor: "default",
          eventMode: 'static'
        });
        if (layer === SILKSCREEN) {
            traceGraphic.isTopSideGroup = isTopSideGroup;
        }
        traceGraphic.netId = parseInt(netId, 10);
        traceGraphic.netName = (net_index_to_name instanceof Map) 
          ? net_index_to_name.get(traceGraphic.netId) 
          : net_index_to_name[traceGraphic.netId] || "";
        
        if (!netObjectsMap[netId]) {
          netObjectsMap[netId] = [];
        }
        netObjectsMap[netId].push(traceGraphic);

        const colorNum = layerColors[layer]?.num ?? 0x000000;

        for (const shapeData of shapesArray) {
          const shellCoords = shapeData.shell;
          const holeCoordsArray = shapeData.holes;

          if (shellCoords && shellCoords.length >= 3) {
            traceGraphic.moveTo(shellCoords[0][0], shellCoords[0][1]);
            for (let i = 1; i < shellCoords.length; i++) {
              traceGraphic.lineTo(shellCoords[i][0], shellCoords[i][1]);
            }
            traceGraphic.closePath();
            traceGraphic.fill({ color: 0xFFFFFF });

            if (holeCoordsArray && holeCoordsArray.length > 0) {
              for (const holeCoords of holeCoordsArray) {
                if (holeCoords && holeCoords.length >= 3) {
                  traceGraphic.moveTo(holeCoords[0][0], holeCoords[0][1]);
                  for (let j = 1; j < holeCoords.length; j++) {
                    traceGraphic.lineTo(holeCoords[j][0], holeCoords[j][1]);
                  }
                  traceGraphic.closePath();
                  traceGraphic.cut();
                }
              }
            }
          }
        }

        traceGraphic.alpha = (layer === SILKSCREEN) ? opacities.silkscreen : (layer === OUTLINE) ? opacities.outline : opacities.trace;
        traceGraphic.baseAlpha = traceGraphic.alpha;
        traceGraphic.tint = colorNum;
        
        traceGraphic.on('pointerover', (e) => {
          let tt = traceGraphic.netName ? `Trace: ${traceGraphic.netName}` : `Trace: Net ${traceGraphic.netId}`;
          // Append net-level reading if any pin on this net has one
          const netReading = window.boardMetadata?.netReadingsMap?.get(traceGraphic.netId);
          if (netReading) tt += ` [${netReading.displayValue}]`;
          showTooltip(tt, e.clientX, e.clientY);
        });
        // PERF: tooltip repositioning handled by single stage-level pointermove handler
        traceGraphic.on('pointerout', hideTooltip);
        traceGraphic.on('pointertap', toggleHighlight);
        
        layerContainer.addChild(traceGraphic);
      }
    }
  }
  console.time('Rendering vias');
  if (progressModal.isVisible) {
    progressModal.updateProgress(80, 'Rendering vias...');
    await delay(50);
  }

  // Batch via rendering with batched layer creation and deferred text
  renderVias(vias, mapX, mapY, layerContainers, layerGraphics, layerColors, style, displayMap, 
    SILKSCREEN, OUTLINE, PINS, PART_OUTLINES, mainGroup, viaContainers, viaTextContainers, 
    net_index_to_name, showViaNumbers, window.scale);
  console.timeEnd('Rendering vias');
  console.time('Constructing component groups');
  if (progressModal.isVisible) {
    progressModal.updateProgress(90, 'Constructing component groups...');
    await delay(50);
  }

  const pinsOverlay = layerContainers[PINS];
  pinsOverlay.label = 'Pins';
  pinsOverlay.eventMode = 'static';

  buildComponentGroups({
    type07Blocks: main_data_blocks.filter(block => block.DATA?.parsed_data || block.DATA),
    pinsOverlay,
    layerContainers,
    layerColors,
    net_index_to_name,
    netObjectsMap,
    opacities,
    style,
    mapX,
    mapY,
    partLabelContainers,
    showPartLabels,
    partLabelScale,
    partOutlineWidthScale,
    toggleHighlight,
    showTooltip,
    moveTooltip,
    hideTooltip,
    toggleStickyTooltip,
    diodeReadings: diode_readings,
  });
  console.timeEnd('Constructing component groups');
  console.time('Preparing net and component readings');
  // Store diode readings and type on boardMetadata for details panel / tooltip lookup
  window.boardMetadata.diodeReadings = diode_readings;
  window.boardMetadata.readingType = reading_type;

  // Build netReadingsMap (Map<netId, reading>) and componentReadingsMap (Map<partName, Map<pinName, reading>>).
  // netReadingsMap propagates a reading to the entire net (any pin on the net contributes).
  // componentReadingsMap aggregates all available readings for each component:
  //   1st priority: direct per-pin reading from diodeReadings (original measurement)
  //   2nd priority: net-derived reading from netReadingsMap (another pin on the same net has a reading)
  const netReadingsMap = new Map();
  const componentReadingsMap = new Map();
  if (diode_readings && diode_readings.size > 0) {
    // Pass 1: build netReadingsMap — find the first pin on each net that has a direct reading
    for (const netId in netObjectsMap) {
      const nid = Number(netId);
      if (netReadingsMap.has(nid)) continue;
      for (const obj of netObjectsMap[netId]) {
        const pName = obj.partName;
        const pinN  = obj.pinName;
        if (!pName || !pinN) continue;
        const reading = diode_readings.get(pName)?.get(pinN);
        if (reading) {
          netReadingsMap.set(nid, reading);
          break;
        }
      }
    }

    // Pass 2: build componentReadingsMap — for each pin, use direct reading or net fallback
    for (const netId in netObjectsMap) {
      const nid = Number(netId);
      for (const obj of netObjectsMap[netId]) {
        const pName = obj.partName;
        const pinN  = obj.pinName;
        if (!pName || !pinN) continue;
        const directReading = diode_readings.get(pName)?.get(pinN);
        const reading = directReading ?? netReadingsMap.get(nid);
        if (reading) {
          if (!componentReadingsMap.has(pName)) componentReadingsMap.set(pName, new Map());
          const pinMap = componentReadingsMap.get(pName);
          if (!pinMap.has(pinN)) {
            pinMap.set(pinN, {
              ...reading,
              isDirect: !!directReading // true = measured on this pin, false = derived from net
            });
          }
        }
      }
    }
  }
  window.boardMetadata.netReadingsMap = netReadingsMap;
  window.boardMetadata.componentReadingsMap = componentReadingsMap;
  console.timeEnd('Preparing net and component readings');
  console.time('Building controls');
  mainGroup.addChild(pinsOverlay);


  buildControls({
    controls,
    layers,
    displayMap,
    defaultVisible,
    viaTextContainers,
    layerContainers,
    layerColors,
    viaContainers,
    interactionManager,
    getLayerDisplayName,
    initialPartOutlineWidthScale: partOutlineWidthScale,
    initialPartLabelScale: partLabelScale,
    initialTraceWidthScale: traceWidthScale,
    initialSilkscreenWidthScale: silkscreenWidthScale,
    initialBoardOutlineWidthScale: boardOutlineWidthScale,
    initialOpacities: opacities,
    callbacks: {
      onActiveLayersChange: (layersArray) => {
          window.userActiveLayers = new Set(layersArray);
      },
      setPartOutlineWidthScale: async (val) => { 
          partOutlineWidthScale = val; 
          saveSetting('widthScales.partOutline', val);
          updateDynamicWidths(window.mapXCache, window.mapYCache, window.scale);
      },
      setTraceWidthScale: async (val) => { 
          traceWidthScale = val; 
          saveSetting('widthScales.trace', val);
          updateDynamicWidths(window.mapXCache, window.mapYCache, window.scale);
      },
      setSilkscreenWidthScale: async (val) => { 
          silkscreenWidthScale = val; 
          saveSetting('widthScales.silkscreen', val);
          updateDynamicWidths(window.mapXCache, window.mapYCache, window.scale);
      },
      setBoardOutlineWidthScale: async (val) => { 
          boardOutlineWidthScale = val; 
          saveSetting('widthScales.boardOutline', val);
          updateDynamicWidths(window.mapXCache, window.mapYCache, window.scale);
      },
      setOpacity: (type, val) => {
          opacities[type] = val;
          saveSetting('opacities.' + type, val);
          if (type === 'vias') {
              viaContainers.forEach(container => { container.alpha = val; container.baseAlpha = val; });
              return;
          }
          if (type === 'part_outlines' && netObjectsMap["outlineGraphics"]) {
             netObjectsMap["outlineGraphics"].forEach(g => { g.alpha = val; g.baseAlpha = val; });
             return;
          }
          if (type === 'partLabels') {
             partLabelContainers.forEach(g => { g.alpha = val; g.baseAlpha = val; });
             return;
          }
          Object.keys(netObjectsMap).forEach(netId => {
              if (netId === "outlineGraphics") return;
              netObjectsMap[netId].forEach(obj => {
                  const rawLayerStr = obj.parent?.label?.replace('layer', '');
                  let layerId = parseInt(rawLayerStr);
                  if (isNaN(layerId)) {
                      if (type === 'pins' && obj.label === 'pinGraphic') { obj.alpha = val; obj.baseAlpha = val; }
                      return;
                  }
                  
                  if (type === 'trace' && layerId <= 16 && obj.label && obj.label.startsWith('traceGraphicNet')) { obj.alpha = val; obj.baseAlpha = val; }
                  if (type === 'outline' && layerId === OUTLINE && obj.label && obj.label.startsWith('traceGraphicNet')) { obj.alpha = val; obj.baseAlpha = val; }
                  if (type === 'silkscreen' && layerId === SILKSCREEN && obj.label && obj.label.startsWith('traceGraphicNet')) { obj.alpha = val; obj.baseAlpha = val; }
              });
          });
      },
      toggleShowViaNumbers: () => { showViaNumbers = !showViaNumbers; saveSetting('toggles.viaNumbers', showViaNumbers); return showViaNumbers; },
      getShowViaNumbers: () => showViaNumbers,
      toggleShowPartLabels: () => {
        showPartLabels = !showPartLabels;
        saveSetting('toggles.partLabels', showPartLabels);
        partLabelContainers.forEach(g => { g.visible = showPartLabels; });
        return showPartLabels;
      },
      getShowPartLabels: () => showPartLabels,
      setPartLabelScale: (val) => {
        partLabelScale = val;
        saveSetting('widthScales.partLabels', val);
        // Re-scaling in-place: the base font was baked at construction time,
        // so we just scale the container uniformly.
        partLabelContainers.forEach(g => { 
            g.scale.x = val;
            g.scale.y = val;
        });
      },
      toggleCrosshair: () => {
        showCrosshair = !showCrosshair;
        if (!showCrosshair && crosshairGraphics) crosshairGraphics.clear();
        if (coordsOverlay) coordsOverlay.style.display = showCrosshair ? 'block' : 'none';
        return showCrosshair;
      },
      onLayerColorChange: (layer, newCssColor) => {
        const colorNum = colorToNumber(newCssColor);
        layerColors[layer] = { css: newCssColor, num: colorNum };
        saveSetting('layerColors.' + layer, newCssColor);
        
        function updateTintRecursive(v) {
          if (v.label === "pinGraphic" && (v.netName === "GND" || v.netName === "NC")) return;
          if (v.tint !== undefined && v.label !== "layerGraphics") {
            v.tint = colorNum;
          } else if (v.label === "layerGraphics") {
            v.tint = colorNum; // For vias arcs
          }
          if (v.children) v.children.forEach(c => updateTintRecursive(c));
        }

        if (layerContainers[layer]) {
          updateTintRecursive(layerContainers[layer]);
        }
      },
      setFocusLayer: (focusedLayerId) => {
        Object.keys(layerContainers).forEach(lId => {
          const container = layerContainers[lId];
          if (!container) return;
          if (focusedLayerId === null) {
            container.alpha = 1.0;
          } else {
            container.alpha = (Number(lId) === focusedLayerId) ? 1.0 : 0.25;
          }
        });
      },
      toggleBoardFolding: () => toggleBoardFolding(),
      toggleFlipBoard: () => toggleFlipBoard(null),
      getFlipAroundCursor: () => flipAroundCursor,
      toggleFlipAroundCursor: (val) => { flipAroundCursor = val; saveSetting('toggles.flipAroundCursor', val); }
    }
  });
  console.timeEnd('Building Controls');
  if (progressModal.isVisible) {
    progressModal.updateProgress(100, 'Complete!');
    await delay(50);
  }
  console.time('Rendering Freeform Annotations');
  // Render Freeform annotations dynamically after segments load
  renderFreeformAnnotations();
  console.timeEnd('Rendering Freeform Annotations');

  console.time('Updating Flip State');
  updateFlipState();
  console.timeEnd('Updating Flip State');

  console.time('Fitting to Screen');
  fitToScreen();
  console.timeEnd('Fitting to Screen');
}



function fitToScreen() {
  if (!mainGroup || !app) return;

  mainGroup.rotation = 0;

  const bounds = mainGroup.getLocalBounds();
  if (bounds.width === 0 || bounds.height === 0) return;

  const scaleX = app.screen.width / bounds.width;
  const scaleY = app.screen.height / bounds.height;
  const scale = Math.min(scaleX, scaleY) * 0.85;

  mainGroup.scale.set(scale);
  
  const contentCenterX = bounds.x + bounds.width / 2;
  const contentCenterY = bounds.y + bounds.height / 2;
  
  mainGroup.x = (app.screen.width / 2) - (contentCenterX * scale);
  mainGroup.y = (app.screen.height / 2) - (contentCenterY * scale);

  // Culling checkpoint: after camera reset we know what's on-screen
  scheduleCulling();
}

async function loadPCBFile() {
  try {
    progressModal.show();
    const params = new URLSearchParams(window.location.search);
    let filename = params.get('file');
    if (!filename) {
        throw new Error('No file specified in URL parameter');
    }
    const response = await fetch(`./${filename}`);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    progressModal.updateProgress(5, 'Loading file...');
    document.title = `${filename.split('/').pop()} - WebPCBViewer`;
    
    // Read binary data for .pcb file
    const buffer = await response.arrayBuffer();
    
    progressModal.updateProgress(15, 'Parsing PCB...');
    const progressCallback = progressModal.createProgressCallback();
    const parser = new RawPCBParser(progressCallback);
    const data = parser.parse(buffer);
    
    window.originalParsedData = data;
    const settings = loadSettings();
    window.isFolded = settings.toggles.boardFolding || false;

    progressModal.updateProgress(35, 'Rendering PCB...');
    await rebuildBoard();

  } catch (err) {
    console.warn('Automatic fetch failed:', err);
    handleFileInputFallback();
  } finally {
    progressModal.hide();
  }
}

function handleFileInputFallback() {
  const controls = document.getElementById('controls');
  controls.innerHTML = '';
  const info = document.createElement('h2');
  info.textContent = 'Select a board to view:';
  controls.appendChild(info);
  
  const hint = document.createElement('span');
  Object.assign(hint.style, { fontSize: '0.75rem', marginTop: '4px', display: 'block', marginBottom: '16px' });
  hint.textContent = 'Input file can be a PCB file, a CAD file (GenCAD1.4 or Fabmaster Allegro), or a JSON file exported from ImHex using the XZZPCB pattern file.';
  controls.appendChild(hint);
  
  const label = document.createElement('label');
  label.htmlFor = "fileInput";
  label.id = "fileInputLabel";
  label.textContent = 'Choose File from Computer';
  label.style.display = 'inline-block';
  label.style.marginBottom = '24px';
  controls.appendChild(label);

  const input = Object.assign(document.createElement('input'), {
    type: 'file',
    accept: '.pcb,.json,application/json',
    onchange: () => {
      const file = input.files[0];
      handleFileInput(file);
    }
  });
  input.id = "fileInput";
  input.style.display = "none";
  controls.appendChild(input);

  // --- Sample Files Section ---
  const sampleHeading = document.createElement('h3');
  sampleHeading.textContent = 'Or select a sample file:';
  sampleHeading.style.marginTop = '10px';
  sampleHeading.style.marginBottom = '10px';
  sampleHeading.style.borderTop = '1px solid #444';
  sampleHeading.style.paddingTop = '20px';
  controls.appendChild(sampleHeading);

  const sampleFiles = [
    './sample-data/V397_70.pcb',
    './sample-data/Switch OLED-HEG-CPU-01 PCB layer.pcb',
    './sample-data/PS5-EDM-010 100889021 PCB layer.pcb'
  ];

  const sampleList = document.createElement('ul');
  sampleList.style.listStyleType = 'none';
  sampleList.style.padding = '0';
  sampleList.style.margin = '0';
  sampleList.style.display = 'flex';
  sampleList.style.flexDirection = 'column';
  sampleList.style.gap = '8px';

  sampleFiles.forEach(filepath => {
      const li = document.createElement('li');
      const btn = document.createElement('button');
      btn.textContent = filepath.split('/').pop();
      Object.assign(btn.style, {
          padding: '8px 12px',
          backgroundColor: '#333',
          border: '1px solid #555',
          color: '#fff',
          borderRadius: '4px',
          cursor: 'pointer',
          textAlign: 'left',
          width: '100%',
          fontSize: '0.85rem',
          transition: 'background-color 0.2s'
      });
      btn.onmouseover = () => btn.style.backgroundColor = '#444';
      btn.onmouseout = () => btn.style.backgroundColor = '#333';
      btn.onclick = () => {
          // Navigate to URL with the file parameter
          window.location.search = `?file=${encodeURIComponent(filepath)}`;
      };
      li.appendChild(btn);
      sampleList.appendChild(li);
  });

  controls.appendChild(sampleList);
}

function handleFileInput(file) {
  if (!file) return;

  // Key all annotations/notes to this board's filename
  setCurrentBoard(file.name);
  document.title = `${file.name} - WebPCBViewer`;
  // Notify the UI notes textarea to reload for this board
  window.dispatchEvent(new CustomEvent('boardChanged', { detail: { filename: file.name } }));

  const reader = new FileReader();
  const isPCB = file.name.toLowerCase().endsWith('.pcb');

  progressModal.show();

  reader.onload = async (e) => {
    try {
      let data;

      if (isPCB) {
        const progressCallback = progressModal.createProgressCallback();
        const parser = new RawPCBParser(progressCallback);
        data = parser.parse(e.target.result);
      } else {
        progressModal.updateProgress(35, 'Parsing JSON...');
        data = JSON.parse(e.target.result);
      }
      
      window.originalParsedData = data;
      const settings = loadSettings();
      window.isFolded = settings.toggles.boardFolding || false;

      progressModal.updateProgress(40, 'Building Layers...');
      await rebuildBoard();

    } catch (error) {
      const controls = document.getElementById('controls');
      controls.textContent = `Invalid ${isPCB ? 'PCB' : 'JSON'} file.`;
      console.error('Parsing error:', error);
    } finally {
      progressModal.hide();
    }
  };

  isPCB ? reader.readAsArrayBuffer(file) : reader.readAsText(file);
}

loadPCBFile();

document.addEventListener('DOMContentLoaded', () => {
  initDebugModal();
  const btn = document.getElementById('debug-data-btn');
  if (btn) btn.addEventListener('click', openDebugModal);
});

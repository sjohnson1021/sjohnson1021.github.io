const decryptor = new DESDecryptor();

function parseArcBlock(reader) {
  const blockSize = reader.readUint32();
  const startOffset = reader.getOffset();
  const endOffset = startOffset + blockSize;
  const layer = reader.readUint32();
  const x1 = reader.readUint32() / XY_SCALE;
  const y1 = reader.readUint32() / XY_SCALE;
  const r = reader.readInt32() / XY_SCALE;
  const angleStart = reader.readInt32() / XY_SCALE;
  const angleEnd = reader.readInt32() / XY_SCALE;
  const scale = reader.readInt32() / XY_SCALE;
  const netIndex = reader.readInt32();

  reader.setOffset(endOffset);

  return {
    ARC: {
      layer,
      x1,
      y1,
      r,
      angle_start: angleStart,
      angle_end: angleEnd,
      scale,
      net_index: netIndex
    }
  };
}

function parseViaBlock(reader) {
  const blockSize = reader.readUint32();
  const startOffset = reader.getOffset();
  const endOffset = startOffset + blockSize;
  const x = reader.readInt32() / XY_SCALE;
  const y = reader.readInt32() / XY_SCALE;
  const outerRadius = reader.readInt32() / XY_SCALE;
  const innerRadius = reader.readInt32() / XY_SCALE;
  const layerAIndex = reader.readUint32();
  const layerBIndex = reader.readUint32();
  const netIndex = reader.readUint32();
  const viaTextLength = reader.readUint32();
  const viaText = reader.readString(viaTextLength);

  reader.setOffset(endOffset);

  return {
    VIA: {
      x,
      y,
      outer_radius: outerRadius,
      inner_radius: innerRadius,
      layer_a_index: layerAIndex,
      layer_b_index: layerBIndex,
      net_index: netIndex,
      via_text: viaText
    }
  };
}

function parseSegmentBlock(reader) {
  const blockSize = reader.readUint32();
  const startOffset = reader.getOffset();
  const endOffset = startOffset + blockSize;
  const layer = reader.readUint32();
  const x1 = reader.readInt32() / XY_SCALE;
  const y1 = reader.readInt32() / XY_SCALE;
  const x2 = reader.readInt32() / XY_SCALE;
  const y2 = reader.readInt32() / XY_SCALE;
  const scale = reader.readInt32() / XY_SCALE;
  const traceNetIndex = reader.readUint32();

  reader.setOffset(endOffset);

  return {
    SEGMENT: {
      layer,
      x1,
      y1,
      x2,
      y2,
      scale,
      net_index: traceNetIndex
    }
  };
}

function parseTextBlock(reader) {
  const blockSize = reader.readUint32();
  const startOffset = reader.getOffset();
  const endOffset = startOffset + blockSize;
  const unknown1 = reader.readUint32();
  const posX = reader.readUint32() / XY_SCALE;
  const posY = reader.readUint32() / XY_SCALE;
  const textSize = reader.readUint32() / XY_SCALE;
  const divider = reader.readUint32();
  const empty = reader.readUint32();
  const one = reader.readUint16();
  const textLength = reader.readUint32();
  const text = reader.readString(textLength);

  reader.setOffset(endOffset);

  return {
    TEXT: {
      unknown_1: unknown1,
      pos_x: posX,
      pos_y: posY,
      text_size: textSize,
      divider,
      empty,
      one,
      text_length: textLength,
      text
    }
  };
}

function parseDataBlock(reader) {
  const blockSize = reader.readUint32();
  const startOffset = reader.getOffset();
  
  const encryptedData = new Uint8Array(
    reader.dataView.buffer,
    reader.dataView.byteOffset + startOffset,
    blockSize
  );
  reader.skip(blockSize);

  let decryptedData;
  try {
    decryptedData = decryptor.decrypt(encryptedData);
  } catch (error) {
    console.error('Decryption failed:', error);
    decryptedData = encryptedData;
  }

  let parsedData = null;
  try {
    const partDataParser = new PartDataParser();
    parsedData = partDataParser.parse(decryptedData.buffer, blockSize);
  } catch (error) {
    console.error('PartData parsing failed:', error);
  }

  return {
    DATA: {
      block_size: blockSize,
      encrypted_data: Array.from(encryptedData),
      decrypted_data: Array.from(decryptedData),
      parsed_data: parsedData
    }
  };
}

function skipBlock(reader, size = 1) {
  reader.skip(size);
  return null;
}


// --- js/parsers/pcb-parser.js ---






class PCBParser {
  constructor(progressCallback = null) {
    this.reader = null;
    this.mainDataBlocksSize = 0;
    this.netBlockStart = 0;
    this.progress = new ProgressReporter(progressCallback);
  }

  parseFileHeader() {
    const headerStr = this.reader.readString(FILE_HEADER.EXPECTED.length);
    
    if (headerStr !== FILE_HEADER.EXPECTED) {
      console.warn(`Unexpected file header: "${headerStr}". Expected "${FILE_HEADER.EXPECTED}".`);
      throw new Error("Invalid file header");
    }

    this.reader.setOffset(FILE_HEADER.NET_BLOCK_OFFSET);
    const intNetBlockStart = this.reader.readUint32();
    this.netBlockStart = intNetBlockStart + FILE_HEADER.HEADER_ADJUST;

    this.reader.setOffset(FILE_HEADER.MAIN_DATA_SIZE_OFFSET);
    this.mainDataBlocksSize = this.reader.readUint32();
    this.reader.setOffset(FILE_HEADER.DATA_START_OFFSET);

    this.progress.report(1, 10, 'Reading file header');
  }

  parseMainDataBlocks() {
    const blocks = [];
    const startOffset = this.reader.getOffset();
    const endOffset = startOffset + this.mainDataBlocksSize;
    const totalSize = this.mainDataBlocksSize;
    let processedSize = 0;

    this.progress.report(2, 10, 'Parsing data blocks');

    const blockHandlers = {
      [BLOCK_TYPES.ARC]: () => parseArcBlock(this.reader),
      [BLOCK_TYPES.VIA]: () => parseViaBlock(this.reader),
      [BLOCK_TYPES.UNKNOWN_03]: () => {
        const size = this.reader.readUint32();
        return skipBlock(this.reader, size);
      },
      [BLOCK_TYPES.PADDING_04]: () => skipBlock(this.reader),
      [BLOCK_TYPES.SEGMENT]: () => parseSegmentBlock(this.reader),
      [BLOCK_TYPES.TEXT]: () => parseTextBlock(this.reader),
      [BLOCK_TYPES.DATA]: () => parseDataBlock(this.reader),
      [BLOCK_TYPES.PADDING_08]: () => skipBlock(this.reader),
      [BLOCK_TYPES.UNKNOWN_09]: () => {
        const size = this.reader.readUint32();
        return skipBlock(this.reader, size);
      }
    };

    let blockCount = 0;
    while (this.reader.getOffset() < endOffset && this.reader.hasMore()) {
      if (this.reader.dataView.getUint32(this.reader.getOffset(), true) === 0) {
        this.reader.skip(4);
        continue;
      }

      const blockType = this.reader.readUint8();
      const handler = blockHandlers[blockType];
      const block = handler ? handler() : null;

      if (block) {
        blocks.push(block);
      } else if (!handler) {
        console.warn(`Unknown block type: 0x${blockType.toString(16)} at offset ${this.reader.getOffset()}`);
      }

      if (++blockCount % 100 === 0) {
        processedSize = this.reader.getOffset() - startOffset;
        this.progress.report(
          2 + (processedSize / totalSize) * 6,
          10,
          `Parsed ${blockCount} blocks`
        );
      }
    }

    this.progress.report(6, 10, 'Parsing netlist');
    this.reader.setOffset(this.netBlockStart);
    
    const netListSize = this.reader.readUint32();
    const netListEnd = this.reader.getOffset() + netListSize;
    const netIndexToName = new Map();
    
    while (this.reader.getOffset() < netListEnd) {
      const netEntrySize = this.reader.readUint32();
      const netIndex = this.reader.readUint32();
      const netNameLength = netEntrySize - 8;
      const netName = this.reader.readString(netNameLength);
      netIndexToName.set(netIndex, netName);
    }

    this.progress.report(7.5, 10, 'Parsing diode readings');
    const diodeResult = this.parseDiodeReadings();

    this.progress.report(9, 10, `Completed parsing ${blocks.length} blocks and ${netIndexToName.size} nets`);
    
    return {
      blocks,
      netIndexToName,
      diodeReadings: diodeResult.readings,
      readingType: diodeResult.readingType
    };
  }

  parseDiodeReadings() {
    const diodeReadings = new Map();
    let readingType = 'Readings'; // default
    
    const headerIndex = findSequence(this.reader.dataView, DIODE_BYTES.HEADER);
    if (headerIndex === -1) {
      return { readings: diodeReadings, readingType };
    }
    
    this.reader.setOffset(headerIndex + DIODE_BYTES.HEADER.length);
    
    // Skip past the === separator that immediately follows the HEADER
    const separatorIndex = findSequence(this.reader.dataView, DIODE_BYTES.SEPARATOR);
    if (separatorIndex !== -1 && separatorIndex >= this.reader.getOffset()) {
      // Move past the === separator — the type string starts right after it
      this.reader.setOffset(separatorIndex + DIODE_BYTES.SEPARATOR.length);
      
      // Read bytes until we hit the [0x0A, 0x3D] ('\n=') terminator
      const typeBytes = [];
      while (this.reader.hasMore()) {
        const offset = this.reader.getOffset();
        const b = this.reader.dataView.getUint8(offset);
        // Check for the \n= terminator pair
        if (b === 0x0A && offset + 1 < this.reader.dataView.byteLength &&
            this.reader.dataView.getUint8(offset + 1) === 0x3D) {
          break;
        }
        typeBytes.push(b);
        this.reader.skip(1);
      }
      
      if (typeBytes.length > 0 && typeBytes.length <= 20) {
        const typeString = typeBytes.map(b => String.fromCharCode(b)).join('');
        if (DIODE_BYTES.READING_TYPES[typeString]) {
          readingType = DIODE_BYTES.READING_TYPES[typeString];
        }
      }
    }
    
    //this.reader.skip(4);
    
    // Determine unit label from reading type
    const unit = (readingType === 'Diode' || readingType === 'Voltage') ? 'V' : 'V';
    
    while (this.reader.hasMore()) {
      const nextByte = this.reader.readUint8();
      
      if (nextByte === DIODE_BYTES.PADDING) {
        if (this.reader.hasMore() && this.reader.dataView.getUint8(this.reader.getOffset()) === DIODE_BYTES.PADDING) {
          break;
        }
        continue;
      }
      
      if (nextByte !== DIODE_BYTES.EQUALS) {
        break;
      }
      
      const rawValue = this.reader.readStringUntil(DIODE_BYTES.EQUALS);
      this.reader.skip(1);
      const partNumber = this.reader.readStringUntil(DIODE_BYTES.OPEN_PAREN);
      
      if (this.reader.readUint8() !== DIODE_BYTES.OPEN_PAREN) {
        break;
      }
      
      const pinNumber = this.reader.readStringUntil(DIODE_BYTES.CLOSE_PAREN);
      
      if (this.reader.readUint8() !== DIODE_BYTES.CLOSE_PAREN) {
        break;
      }
      
      if (!diodeReadings.has(partNumber)) {
        diodeReadings.set(partNumber, new Map());
      }
      
      // Values are stored as integer millivolts/milliohms — divide by 1000
      const numericValue = parseFloat(rawValue) || 0;
      const displayValue = (numericValue / 1000).toFixed(3);
      
      const partReadings = diodeReadings.get(partNumber);
      partReadings.set(pinNumber, {
        value: numericValue / 1000,
        rawValue,
        displayValue: `${displayValue}${unit}`,
        type: readingType
      });
    }
    
    return { readings: diodeReadings, readingType };
  }

  applyXorDecryption() {
    if (this.reader.dataView.getUint8(0x10) === 0x00) {
      return;
    }

    this.progress.report(0.5, 10, 'Applying XOR decryption');

    const sequenceIndex = findSequence(this.reader.dataView, DIODE_BYTES.HEADER);
    const xoredDataLength = sequenceIndex !== -1 ? sequenceIndex : this.reader.dataView.byteLength;
    const xorKey = this.reader.dataView.getUint8(0x10);

    for (let i = 0; i < xoredDataLength; i++) {
      const current = this.reader.dataView.getUint8(i);
      this.reader.dataView.setUint8(i, current ^ xorKey);
    }
  }

  parse(arrayBuffer) {
    this.reader = new BinaryReader(arrayBuffer);
    this.progress.report(0, 10, 'Initializing parser');

    this.applyXorDecryption();
    this.parseFileHeader();
    const parseResult = this.parseMainDataBlocks();

    this.progress.report(10, 10, 'Parsing complete');

    return {
      main_data_blocks: parseResult.blocks,
      net_index_to_name: parseResult.netIndexToName,
      diode_readings: parseResult.diodeReadings,
      reading_type: parseResult.readingType
    };
  }
}




// --- js/parsers/folding.js ---


function normalizeAngle(angle) {
    while (angle < 0) angle += 3600000;
    while (angle >= 3600000) angle -= 3600000;
    return angle;
}

function applyBoardFolding(originalBlocks) {
  // Use a fast targeted clone to reduce memory overhead and hang times
  const blocks = [];
  for (let i = 0; i < originalBlocks.length; i++) {
     blocks.push(JSON.parse(JSON.stringify(originalBlocks[i])));
  }
  
  let minX = Infinity, maxX = -Infinity;
  
  for (const b of blocks) {
    if (b.SEGMENT && b.SEGMENT.layer === LAYER_IDS.OUTLINE) {
       minX = Math.min(minX, b.SEGMENT.x1, b.SEGMENT.x2);
       maxX = Math.max(maxX, b.SEGMENT.x1, b.SEGMENT.x2);
    }
  }
  
  if (minX === Infinity) return blocks; // No outline? No fold.
  
  const centerAxis = (minX + maxX) / 2.0;
  console.log("Fold Center Axis detected at:", centerAxis);

  const mirrorX = (x) => 2 * centerAxis - x;
  const newBlocks = [];

  for (const block of blocks) {
    if (block.SEGMENT) {
      const seg = block.SEGMENT;
      if (seg.layer === LAYER_IDS.OUTLINE) {
        // clean duplicate outline segments: only keep left side
        const midX = (seg.x1 + seg.x2) / 2;
        if (midX <= centerAxis + 10) { 
           seg.isTopSideGroup = false;
           newBlocks.push(block);
        }
      } else {
        const midX = (seg.x1 + seg.x2) / 2;
        if (midX > centerAxis) {
          seg.x1 = mirrorX(seg.x1);
          seg.x2 = mirrorX(seg.x2);
          seg.layer += 1000; // offset layer to separate Top from Bottom in Worker
          seg.isTopSideGroup = true;
        } else {
          seg.isTopSideGroup = false;
        }
        newBlocks.push(block);
      }
    } 
    else if (block.VIA) {
        const via = block.VIA;
        if (via.x > centerAxis) {
            via.x = mirrorX(via.x);
            via.isTopSideGroup = true;
        } else {
            via.isTopSideGroup = false;
        }
        newBlocks.push(block);
    }
    else if (block.ARC) {
        const arc = block.ARC;
        if (arc.layer === LAYER_IDS.OUTLINE) {
            const midX = arc.x1;
            if (midX <= centerAxis + 10) {
                 arc.isTopSideGroup = false;
                 newBlocks.push(block);
            }
        } else {
            if (arc.x1 > centerAxis) {
                arc.x1 = mirrorX(arc.x1);
                const oldStart = arc.angle_start;
                const oldEnd = arc.angle_end;
                arc.angle_start = normalizeAngle(1800000 - oldEnd);
                arc.angle_end = normalizeAngle(1800000 - oldStart);
                arc.layer += 1000;
                arc.isTopSideGroup = true;
            } else {
                arc.isTopSideGroup = false;
            }
            newBlocks.push(block);
        }
    }
    else if (block.TEXT) {
        const txt = block.TEXT;
        // Text blocks might not have layer isolation depending on rendering but let's tag
        if (txt.pos_x > centerAxis) {
            txt.pos_x = mirrorX(txt.pos_x);
            txt.isTopSideGroup = true;
        } else {
            txt.isTopSideGroup = false;
        }
        newBlocks.push(block);
    }
    else if (block.DATA) {
        const data = block.DATA;
        data.isTopSideGroup = false;
        if (data.parsed_data && data.parsed_data.header) {
            const h = data.parsed_data.header;
            if (h.part_x > centerAxis) {
                h.part_x = mirrorX(h.part_x);
                data.isTopSideGroup = true;
                if (data.parsed_data.sub_blocks) {
                    for (const sub of data.parsed_data.sub_blocks) {
                        sub.isTopSideGroup = true;
                        if (sub.layer !== undefined) sub.layer += 1000;
                        
                        if (sub.sub_type_identifier_05 === SUB_BLOCK_TYPES.SEGMENT) {
                           sub.x1 = mirrorX(sub.x1);
                           sub.x2 = mirrorX(sub.x2);
                        } else if (sub.sub_type_identifier_06 === SUB_BLOCK_TYPES.LABEL) {
                           sub.x = mirrorX(sub.x);
                        } else if (sub.sub_type_identifier_09 === SUB_BLOCK_TYPES.PINS) {
                           for (const pin of sub.pins) {
                               pin.x = mirrorX(pin.x);
                           }
                        } else if (sub.x1 !== undefined && sub.radius !== undefined) {
                           sub.x1 = mirrorX(sub.x1);
                           const oldStart = sub.angle_start;
                           const oldEnd = sub.angle_end;
                           sub.angle_start = normalizeAngle(1800000 - oldEnd);
                           sub.angle_end = normalizeAngle(1800000 - oldStart);
                        }
                    }
                }
            }
        }
        newBlocks.push(block);
    }
    else {
        newBlocks.push(block);
    }
  }

  return newBlocks;
}

function buildControls(state) {
  const {
    controls,
    layers,
    displayMap,
    defaultVisible,
    viaTextContainers,
    layerContainers,
    layerColors,

    callbacks
  } = state;

  const { OUTLINE, SILKSCREEN } = LAYER_IDS;

  controls.innerHTML = '';

  const tabHeader = document.createElement('div');
  tabHeader.className = 'tab-header';
  const settingsTabBtn = document.createElement('button');

  settingsTabBtn.textContent = 'Settings';
  const layersTabBtn = document.createElement('button');
  layersTabBtn.className = 'tab-btn active';
  layersTabBtn.textContent = 'Layers';

  const settingsTab = document.createElement('div');

  const layersTab = document.createElement('div');
  layersTab.className = 'tab-content active';
  layersTab.id = 'layers-tab';

  settingsTabBtn.onclick = () => {
    settingsTabBtn.classList.add('active');
    layersTabBtn.classList.remove('active');
    settingsTab.classList.add('active');
    layersTab.classList.remove('active');
  };
  layersTabBtn.onclick = () => {
    layersTabBtn.classList.add('active');
    settingsTabBtn.classList.remove('active');
    layersTab.classList.add('active');
    settingsTab.classList.remove('active');
  };

  controls.append(settingsTab, layersTab);

  const controlWrapper = document.getElementById('control-panel');
  if (controlWrapper) {
    controlWrapper.classList.replace('panel-center', 'panel-left');
  }

  const createSlider = (text, min, max, step, initialVal, onChange, isWidth=false) => {
    const container = document.createElement('div');
    container.className = "slider-container";
    
    const label = document.createElement('label');
    label.className = "slider-label";
    const formatLabel = (val) => `${text}: ${isWidth ? val.toFixed(1) + 'x' : (val * 100).toFixed(0) + '%'}`;
    
    const textNode = document.createTextNode(formatLabel(initialVal));
    label.appendChild(textNode);
    
    const input = Object.assign(document.createElement('input'), {
      type: 'range', min, max, step, value: initialVal.toString(),
      className: 'slider-input',
      oninput: () => {
        const val = parseFloat(input.value);
        textNode.nodeValue = formatLabel(val);
        if (!isWidth && onChange) onChange(val);
      },
      onchange: () => {
        if (isWidth && onChange) onChange(parseFloat(input.value));
      }
    });
    
    label.appendChild(input);
    container.appendChild(label);
    return container;
  };

  const widthSliders = document.createElement('div');
  widthSliders.className = "settings-group";
  createControlHeader(widthSliders, 'Width Scales');

  }, true));
  widthSliders.appendChild(createSlider('Silkscreen', 0.1, 5.0, 0.1, initialSilkscreenWidthScale, (val) => {

  }, true));
  widthSliders.appendChild(createSlider('Board Outline', 0.1, 5.0, 0.1, initialBoardOutlineWidthScale, (val) => {

  }, true));
  widthSliders.appendChild(createSlider('Part Outlines', 0.1, 2.5, 0.1, initialPartOutlineWidthScale, (val) => {
      if (callbacks.setPartOutlineWidthScale) callbacks.setPartOutlineWidthScale(val);
  }, true));
  widthSliders.appendChild(createSlider('Part Labels', 0.1, 3.0, 0.1, initialPartLabelScale, (val) => {
      if (callbacks.setPartLabelScale) callbacks.setPartLabelScale(val);
  }, true));
  const opacitySliders = document.createElement('div');
  opacitySliders.className = "settings-group";
  createControlHeader(opacitySliders, 'Opacities');
  if (callbacks.setOpacity) {
      opacitySliders.appendChild(createSlider('Traces', 0.1, 1, 0.05, initialOpacities.trace, (val) => callbacks.setOpacity('trace', val)));
      opacitySliders.appendChild(createSlider('Vias', 0.1, 1, 0.05, initialOpacities.vias, (val) => callbacks.setOpacity('vias', val)));

      opacitySliders.appendChild(createSlider('Part Outlines', 0.1, 1, 0.05, initialOpacities.part_outlines, (val) => callbacks.setOpacity('part_outlines', val)));
      opacitySliders.appendChild(createSlider('Part Labels', 0.1, 1, 0.05, (initialOpacities.partLabels ?? 0.8), (val) => callbacks.setOpacity('partLabels', val)));
      opacitySliders.appendChild(createSlider('Board Outline', 0.1, 1, 0.05, initialOpacities.outline, (val) => callbacks.setOpacity('outline', val)));

  createControlHeader(notesGroup, 'Board Notes');

  notesArea.id = 'board-notes';
  notesArea.placeholder = 'Notes about this board (saved per file)...';
  notesArea.value = getGeneralNotes();
  Object.assign(notesArea.style, {
    width: '100%', minHeight: '80px', resize: 'vertical',
    background: 'rgba(0,16,35,0.6)', color: '#cdd9e5', border: '1px solid #3a4a5a',
    borderRadius: '4px', padding: '6px 8px', fontFamily: 'monospace', fontSize: '0.8rem',
    boxSizing: 'border-box'
  });
  let notesDebounce;
  notesArea.oninput = () => {
    clearTimeout(notesDebounce);
    notesDebounce = setTimeout(() => setGeneralNotes(notesArea.value), 400);
  };
  // Reload notes when a new board is opened
  window.addEventListener('boardChanged', () => {
    notesArea.value = getGeneralNotes();
  });
  notesGroup.appendChild(notesArea);

  // --- Export / Import ---
  const ioGroup = document.createElement('div');
  ioGroup.className = 'settings-group';
  ioGroup.style.display = 'flex';
  ioGroup.style.gap = '8px';
  ioGroup.style.justifyContent = 'center';

  const exportBtn = document.createElement('button');
  exportBtn.textContent = '⬇ Export Settings';
  exportBtn.onclick = () => {
    const blob = new Blob([exportSettings()], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'pcb_viewer_settings.cfg';
    a.click();
    URL.revokeObjectURL(url);
  };

  importBtn.onclick = () => {
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = '.cfg,.json';
    fileInput.onchange = () => {
      const file = fileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const imported = importSettings(e.target.result);
          // Reload the page to apply all settings cleanly
          location.reload();
        } catch (err) {
          console.error('Import failed:', err);
          alert('Failed to import settings: ' + err.message);
        }
      };
      reader.readAsText(file);
    };
    fileInput.click();

    const btn = document.createElement('button');
    btn.textContent = text;
    btn.classList.toggle('active', initialState);
    btn.onclick = onClick;
    return btn;
  };

  const rotationInitial = uiSettings.toggles.rotation;
  interactionManager.enableRotation = rotationInitial;
  const rotationBtn = createToggleButton(rotationInitial ? 'Rotation: ON' : 'Rotation: OFF', rotationInitial, function () {
    const isEnabled = !this.classList.contains('active');
    this.classList.toggle('active');
    this.textContent = isEnabled ? 'Rotation: ON' : 'Rotation: OFF';
    interactionManager.enableRotation = isEnabled;
    saveSetting('toggles.rotation', isEnabled);
  });

  togglesGroup.append(rotationBtn);

  const activeLayers = new Set();
  defaultVisible.forEach(l => activeLayers.add(l));

  const initialViaNumbers = uiSettings.toggles.viaNumbers ?? true;
  togglesGroup.appendChild(createToggleButton('Via Numbers', initialViaNumbers, function () {
    const show = callbacks.toggleShowViaNumbers();
    this.classList.toggle('active', show);
    viaTextContainers.forEach(text => {
      text.visible = show;
    });
  }));

  const initialPartLabels = uiSettings.toggles.partLabels ?? true;
  togglesGroup.appendChild(createToggleButton('Part Labels', initialPartLabels, function () {
    if (callbacks.toggleShowPartLabels) {
      const show = callbacks.toggleShowPartLabels();
      this.classList.toggle('active', show);
    }
  }));

  function createControlHeader(controlGroup, text) {
    const opacityLabel = document.createElement('div');
    opacityLabel.className = 'settings-group-title';
    opacityLabel.textContent = text;
    controlGroup.appendChild(opacityLabel);
  }

  function updateViaVisibility(activeLayersSet) {
    viaContainers.forEach(container => {
      if (container.label && (container.label.startsWith('viaOuterRings_') || container.label.startsWith('viaTextLabels_'))) {
        const hasLayerA = activeLayersSet.has(container.layer_a_index);
        const hasLayerB = activeLayersSet.has(container.layer_b_index);
        container.visible = hasLayerA || hasLayerB;
      } else if (container.isViaOuterRing) {
        container.visible = activeLayersSet.has(OUTLINE);
      }
    });

    const showViaNum = callbacks.getShowViaNumbers();
    viaTextContainers.forEach(text => {
      text.visible = showViaNum; // Parent container handles layer-based visibility
    });
  }


  
  const crosshairInitial = uiSettings.toggles.crosshair;
  // If saved as on, toggle it on immediately
  if (crosshairInitial && callbacks.toggleCrosshair) callbacks.toggleCrosshair();
  const crosshairBtn = createToggleButton('Crosshair & Coords', crosshairInitial, function () {
    if (callbacks.toggleCrosshair) {
      const show = callbacks.toggleCrosshair();
      this.classList.toggle('active', show);
      saveSetting('toggles.crosshair', show);
    }
  });
  togglesGroup.appendChild(crosshairBtn);
  
  const foldInitial = uiSettings.toggles.boardFolding;
  const foldBtn = createToggleButton('Fold Board (Shift + F)', foldInitial, function () {
    if (callbacks.toggleBoardFolding) {
       callbacks.toggleBoardFolding();
    }
  });
  foldBtn.id = 'foldBtn';
  window.addEventListener('boardFoldToggled', (e) => {
     foldBtn.classList.toggle('active', e.detail);
  });
  togglesGroup.appendChild(foldBtn);

  // Flip Board button — important for mobile (no middle mouse / keyboard)
  const flipBtn = createToggleButton('⬡ Flip Board (F / 3-Finger)', false, function () {
    if (callbacks.toggleFlipBoard) {
      callbacks.toggleFlipBoard();
      this.classList.toggle('active', window.boardSideFlipped);
    }
  });
  flipBtn.id = 'flipBtn';
  flipBtn.title = 'Flip board Top↔Bottom. On mobile: use 3-finger tap.';
  togglesGroup.appendChild(flipBtn);

  if (callbacks.getFlipAroundCursor) {
    const flipCursorBtn = createToggleButton(callbacks.getFlipAroundCursor() ? 'Flip Around Cursor: ON' : 'Flip Around Cursor: OFF', callbacks.getFlipAroundCursor(), function () {
      const isEnabled = !this.classList.contains('active');
      this.classList.toggle('active', isEnabled);
      this.textContent = isEnabled ? 'Flip Around Cursor: ON' : 'Flip Around Cursor: OFF';
      if (callbacks.toggleFlipAroundCursor) callbacks.toggleFlipAroundCursor(isEnabled);
    });
    togglesGroup.appendChild(flipCursorBtn);
  }
  const layersGroup = document.createElement('div');
  layersGroup.className = "settings-group";
  createControlHeader(layersGroup, 'Layer Visibility');
  
  const row = document.createElement('div');
  row.className = "layer";
  const showAllBtn = createToggleButton('Show All', false, function () {
    const isShowingAll = this.textContent === 'Hide All';
    
    if (isShowingAll) {
      layers.forEach(layer => {
        if (layerContainers[layer]) layerContainers[layer].visible = false;
        activeLayers.delete(layer);
      });
      controls.querySelectorAll('button[data-layer]').forEach(btn => {
        btn.classList.remove('active');
      });
      this.textContent = 'Show All';
      this.classList.remove('active');
    } else {
      layers.forEach(layer => {
        if (layerContainers[layer]) layerContainers[layer].visible = true;
        activeLayers.add(layer);
      });
      controls.querySelectorAll('button[data-layer]').forEach(btn => {
        btn.classList.add('active');
      });
      this.textContent = 'Hide All';
      this.classList.add('active');
    }
    
    if (callbacks.onActiveLayersChange) callbacks.onActiveLayersChange(Array.from(activeLayers));
    updateViaVisibility(activeLayers);
  });

  const resetLayersBtn = createToggleButton('↺', false, function () {
    activeLayers.clear();
    defaultVisible.forEach(l => activeLayers.add(l));
    
    layers.forEach(layer => {
      const isVisible = activeLayers.has(layer);
      if (layerContainers[layer]) {
        layerContainers[layer].visible = isVisible;
      }
    });

    controls.querySelectorAll('button[data-layer]').forEach(btn => {
      const layerNum = Number(btn.getAttribute('data-layer'));
      btn.classList.toggle('active', activeLayers.has(layerNum));
    });

    showAllBtn.textContent = 'Show All';
    showAllBtn.classList.remove('active');

    if (callbacks.onActiveLayersChange) callbacks.onActiveLayersChange(Array.from(activeLayers));
    updateViaVisibility(activeLayers);
  });
  resetLayersBtn.id = "resetLayersBtn";
  row.appendChild(resetLayersBtn);

  const clearFocusBtn = createToggleButton('X', false, function () {
    const radios = controls.querySelectorAll('input[name="focusLayer"]');
    radios.forEach(r => r.checked = false);
    if (callbacks.setFocusLayer) callbacks.setFocusLayer(null);
  });
  clearFocusBtn.id = "clearFocusBtn";
  row.appendChild(clearFocusBtn);

  layersGroup.appendChild(row);
  
  layers.forEach(layer => {
  if (layer !== OUTLINE && layer !== SILKSCREEN && !displayMap[layer] && layer <= 16) return;

  const row = document.createElement('div');
  row.className = "layer";

  const btn = createToggleButton(getLayerDisplayName(layer, displayMap), defaultVisible.has(layer), function () {
    const visible = !this.classList.contains('active');
    this.classList.toggle('active');

    if (layerContainers[layer]) {
      layerContainers[layer].visible = visible;
    }

    if (visible) {
      activeLayers.add(layer);
    } else {
      activeLayers.delete(layer);
    }

    if (callbacks.onActiveLayersChange) callbacks.onActiveLayersChange(Array.from(activeLayers));
    updateViaVisibility(activeLayers);
  });

  // btn.style.flexGrow = '1';
  btn.setAttribute('data-layer', layer);
  
  // 🎨 Color container - the visible colored circle
  const colorContainer = document.createElement('div');
  colorContainer.className = "color-container";
  colorContainer.setAttribute('data-layer', layer);
  colorContainer.style.setProperty('--layer-color', layerColors[layer]?.css || '#888');
  colorContainer.style.flexShrink = '0'; // Prevent shrinking in flex layout

  // 🎨 Invisible color picker inside the container
  const colorPicker = document.createElement('input');
  colorPicker.type = 'color';
  colorPicker.style.opacity = '0'; // Invisible but clickable
  colorPicker.style.cursor = 'pointer';
  colorPicker.style.border = 'none';
  colorPicker.style.padding = '0';
  colorPicker.style.background = 'transparent';
  colorPicker.value = (layerColors[layer]?.css || '#888888').substring(0, 7);
  colorPicker.title = "Change color of layer " + layer;
  colorPicker.setAttribute('data-layer', layer);
  
  colorPicker.oninput = (e) => {
    const newColor = e.target.value;
    // Update CSS variable on container for other elements to reference
    colorContainer.style.setProperty('--layer-color', newColor);
    if (callbacks.onLayerColorChange) {
      callbacks.onLayerColorChange(layer, newColor);
    }
  };
  
  // Append picker to container, container to row
  colorContainer.appendChild(colorPicker);
  
  const focusRadio = document.createElement('input');
  focusRadio.type = 'radio';
  focusRadio.name = 'focusLayer';
  focusRadio.title = 'Focus this layer';
  focusRadio.style.cursor = 'pointer';
  focusRadio.onchange = () => {
     if (focusRadio.checked && callbacks.setFocusLayer) {
         callbacks.setFocusLayer(layer);
     }
  };

  row.appendChild(btn);
  row.appendChild(colorContainer); // Append container, not picker directly
  row.appendChild(focusRadio);
  layersGroup.appendChild(row);
});
  controls.querySelectorAll('button[data-layer]').forEach(btn => {
    const layerNum = Number(btn.getAttribute('data-layer'));
    if (layerContainers[layerNum]) {
      btn.classList.toggle('active', !!layerContainers[layerNum].visible);
      if (layerContainers[layerNum].visible) activeLayers.add(layerNum);
    }
  });
  layersTab.appendChild(layersGroup);
  updateViaVisibility(activeLayers);
  viaTextContainers.forEach(text => text.visible = callbacks.getShowViaNumbers());
}


// --- js/ui/details-panel.js ---



let panelEl = null;

function ensurePanel() {
  if (panelEl) return;
  panelEl = document.getElementById('details-wrap');
  
  // Close on Escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && panelEl.dataset.active === 'true') {
      panelEl.dataset.active = 'false';
    }
  });
}

function showDetailsPanel(partName, netName, netId, hitObject, partsOnNet, rawX, rawY) {
  ensurePanel();

  const contentEl = document.getElementById('details-content');
  if (!partName && !netName && netId === null) {
    contentEl.innerHTML = '<p class="details-placeholder">Select a pin or part to view details.</p>';
    panelEl.dataset.active = 'true';
    return;
  }

  // Build the info table
  let html = `
    <h3>Info</h3>
    <table class="details-table">
      <tbody>
  `;

  if (hitObject?.isVia) {
    const via = hitObject.viaData;
    if (netName) html += `<tr><th>Net Name</th><td>${netName}</td></tr>`;
    if (netId !== null) html += `<tr><th>Net ID</th><td>${netId}</td></tr>`;
    html += `<tr><th>Layer A</th><td>${via.layer_a_index}</td></tr>`;
    html += `<tr><th>Layer B</th><td>${via.layer_b_index}</td></tr>`;
    html += `<tr><th>Hole Diameter</th><td>${(via.rInner * 2).toFixed(2)}"</td></tr>`;
    html += `<tr><th>Annular Ring</th><td>${(via.rOuter * 2).toFixed(2)}"</td></tr>`;
  } else {
    // Component or Pin
    if (partName) html += `<tr><th>Part</th><td>${partName}</td></tr>`;
    
    // Extracted Board Metadata
    const compMeta = window.boardMetadata?.components?.[partName];
    if (compMeta) {
      if (compMeta.type && compMeta.type !== 'Unknown') html += `<tr><th>Type</th><td>${compMeta.type}</td></tr>`;
      if (compMeta.valueLabel) html += `<tr><th>Value</th><td>${compMeta.valueLabel}</td></tr>`;
      if (compMeta.footprint) html += `<tr><th>Package/Size</th><td>${compMeta.footprint}</td></tr>`;
      if (compMeta.rotation !== undefined) html += `<tr><th>Rotation</th><td>${compMeta.rotation.toFixed(1)}°</td></tr>`;
    }

    // Show all readings for this part (when no specific pin is targeted).
    // Uses componentReadingsMap which merges direct pin readings with net-derived readings.
    const partReadings = window.boardMetadata?.componentReadingsMap?.get(partName)
      ?? window.boardMetadata?.diodeReadings?.get(partName);
    const readingLabel = window.boardMetadata?.readingType || 'Reading';
    if (partReadings && partReadings.size > 0 && !hitObject?.pinName) {
      html += `<tr><th>Readings</th><td><table class="readings-subtable">`;
      // Sort readings naturally by pin number (e.g., "2" comes before "10", "A2" before "A10")
      const sortedReadings = Array.from(partReadings.entries()).sort((a, b) => {
        return a[0].localeCompare(b[0], undefined, { numeric: true, sensitivity: 'base' });
      });
      for (const [pin, val] of sortedReadings) {
        // Net-derived readings shown with a subtle indicator (italic + dimmed) to distinguish from direct measurements
        const isNetDerived = val.isDirect === false;
        const valueStyle = isNetDerived ? ' style="font-style:italic; opacity:0.7;" title="Net-derived reading"' : '';
        const suffix = isNetDerived ? ' <span style="opacity:0.5; font-size:0.8em;">⇢</span>' : '';
        html += `<tr><td><a href="#" class="net-parts-link reading-pin-link" data-part="${partName}" data-pin="${pin}">${pin}</a></td><td${valueStyle}>${val.displayValue}${suffix}</td></tr>`;
      }
      html += `</table></td></tr>`;
    }

    if (hitObject?.pinName) {
      html += `<tr><th>Pin</th><td>${hitObject.pinName}</td></tr>`;
      if (hitObject.innerDiameter > 0) {
        html += `<tr><th>Pad Type</th><td>Thru-Hole</td></tr>`;
        html += `<tr><th>Hole Diameter</th><td>${hitObject.innerDiameter.toFixed(2)}"</td></tr>`;
      } else {
        html += `<tr><th>Pad Type</th><td>Surface</td></tr>`;
      }
    }

    if (hitObject?.segmentData) {
      const seg = hitObject.segmentData;
      html += `<tr><th>Segment Width</th><td>${(seg.data.width ?? seg.data.scale ?? 0)}</td></tr>`;
      if (seg.p1 && seg.p2) {
        html += `<tr><th>Start Point</th><td>X: ${seg.p1[0].toFixed(4)}"<br>Y: ${seg.p1[1].toFixed(4)}"</td></tr>`;
        html += `<tr><th>End Point</th><td>X: ${seg.p2[0].toFixed(4)}"<br>Y: ${seg.p2[1].toFixed(4)}"</td></tr>`;
      }
      if (seg.data.layer) {
        html += `<tr><th>Layer</th><td>${seg.data.layer}</td></tr>`;
      }
    }

    if (netName) html += `<tr><th>Net Name</th><td>${netName}</td></tr>`;
    if (netId !== null) html += `<tr><th>Net ID</th><td>${netId}</td></tr>`;
  }

  // Universal Reading Display (applies to Pins, Vias, Traces)
  if (!partName || hitObject?.pinName || hitObject?.isVia || hitObject?.segmentData) {
    let readingToShow = null;
    if (hitObject?.pinName && partName) {
      readingToShow = window.boardMetadata?.diodeReadings?.get(partName)?.get(hitObject.pinName);
    }
    if (!readingToShow) {
      readingToShow = (hitObject?.netId != null ? window.boardMetadata?.netReadingsMap?.get(hitObject.netId) : null)
        ?? (netId !== null ? window.boardMetadata?.netReadingsMap?.get(netId) : null);
    }
    if (readingToShow) {
      html += `<tr><th>${'Reading'}</th><td>${readingToShow.displayValue}</td></tr>`;
    }
  }

  // Universal Position
  if (rawX !== undefined && rawY !== undefined) {
    html += `<tr><th>Position</th><td>X: ${rawX.toFixed(4)}"<br>Y: ${rawY.toFixed(4)}"</td></tr>`;
  }

  // Component annotations
  if (partName && !hitObject?.isVia) {
    const comp = getComponent(partName) || {};
    if (comp.value) html += `<tr><th>Job Value Diff</th><td>${comp.value}</td></tr>`;
    if (comp.rating) html += `<tr><th>Rating</th><td>${comp.rating}</td></tr>`;
    if (comp.package) html += `<tr><th>Overriden Package</th><td>${comp.package}</td></tr>`;
    if (comp.mfgCode) html += `<tr><th>MFG Code</th><td>${comp.mfgCode}</td></tr>`;
    if (comp.status) html += `<tr><th>Status</th><td>${comp.status}</td></tr>`;
    if (comp.misc || comp.comment) {
      const extra = [comp.misc, comp.comment].filter(Boolean).join(' | ');
      html += `<tr><th>Notes</th><td>${extra}</td></tr>`;
    }
  }

  // Pin annotations
  if (partName && hitObject?.pinName) {
    const pinObj = getPin(partName, hitObject.pinName) || {};
    if (pinObj.comment) {
      html += `<tr><th>Pin Notes</th><td>${pinObj.comment}</td></tr>`;
    }
  }

  // Net annotations
  const netStoreName = netName || (netId !== null ? `Net${netId}` : null);
  const netData = netStoreName ? (getNet(netStoreName) || {}) : {};
  if (netData.diode) html += `<tr><th>Diode</th><td>${netData.diode}</td></tr>`;
  // if (netData.voltage) html += `<tr><th>Voltage</th><td>${netData.voltage}</td></tr>`;
  // if (netData.resistance) html += `<tr><th>Resistance</th><td>${netData.resistance}</td></tr>`;
  if (netData.comment) html += `<tr><th>Net Notes</th><td>${netData.comment}</td></tr>`;

  html += `
      </tbody>
    </table>
    
    <div class="details-actions">
      <button id="edit-notes-btn" class="btn btn-primary">Edit Notes</button>
    </div>
  `;

  if (partsOnNet && partsOnNet.length > 0) {
    html += `
      <h3 style="margin-top: 20px;">Connections</h3>
      <div class="net-parts-list">
    `;
    partsOnNet.forEach(p => {
      // p is { partName, pinName } now
      const displayName = p.pinName ? `${p.partName}:${p.pinName}` : p.partName;
      html += `<a href="#" class="net-parts-item net-parts-link" style="display:block; margin-bottom:4px; color:#38bdf8; text-decoration:none;" data-part="${p.partName}" data-pin="${p.pinName || ''}">➔ ${displayName}</a>`;
    });
    html += `</div>`;
  }

  contentEl.innerHTML = html;

  // Bind edit button
  const editBtn = document.getElementById('edit-notes-btn');
  if (editBtn) {
    editBtn.onclick = () => {
      openAnnotationModal(partName, hitObject?.pinName, netName, netId, () => {
        // Refresh panel when modal closes
        showPanel(partName, netName, netId, hitObject, partsOnNet, rawX, rawY);
      });
    };
  }

  // Bind part links
  const partLinks = contentEl.querySelectorAll('.net-parts-link');
  partLinks.forEach(link => {
    link.onclick = (e) => {
      e.preventDefault();
      const targetPart = e.currentTarget.dataset.part;
      const targetPin = e.currentTarget.dataset.pin;
      if (targetPart) {
         window.dispatchEvent(new CustomEvent('focusPart', { detail: { partName: targetPart, pinName: targetPin } }));
      }
    };
  });

  // Open panel

  panelEl.dataset.active = 'true';
}

function hideDetailsPanel() {
  if (panelEl) panelEl.dataset.active = 'false';
}

function isPanelVisible() {
  return panelEl && panelEl.dataset.active === 'true';
}

function renderTree(data) {
  const container = document.getElementById('debug-tree-container');
  if (!container) return;
  container.innerHTML = '';
  container.appendChild(createNode('Root', data, true));
}

function debounce(func, wait) {
  let timeout;
  return function executedFunction(...args) {
    const later = () => {
      clearTimeout(timeout);
      func(...args);
    };
    clearTimeout(timeout);
    timeout = setTimeout(later, wait);
  };
}

function parseQuery(queryString) {
  const terms = queryString.split(/\s+/).filter(t => t.length > 0);
  const queries = terms.map(term => {
    const parts = term.split(':');
    if (parts.length === 2) {
      let value = parts[1].toLowerCase();
      let exactMatch = false;
      
      // Exact match with = prefix: net_index:=4
      if (value.startsWith('=')) {
        exactMatch = true;
        value = value.slice(1);
      }
      // Exact match with quotes: net_index:"4"
      else if (value.startsWith('"') && value.endsWith('"')) {
        exactMatch = true;
        value = value.slice(1, -1);
      }
      
      return { 
        key: parts[0].toLowerCase(), 
        value: value,
        exactMatch: exactMatch
      };
    } else {
      // General search (no key)
      let value = term.toLowerCase();
      let exactMatch = false;
      
      if (value.startsWith('=')) {
        exactMatch = true;
        value = value.slice(1);
      } else if (value.startsWith('"') && value.endsWith('"')) {
        exactMatch = true;
        value = value.slice(1, -1);
      }
      
      return { value: value, exactMatch: exactMatch };
    }
  });
  return queries;
}

function matchesQueries(obj, queries) {
  if (!obj || typeof obj !== 'object') return false;
  
  return queries.every(q => {
    if (q.key) {
      const val = obj[q.key];
      if (val !== undefined && val !== null) {
        // Special case: if q.value is also a key in obj, compare their values
        if (q.value in obj) {
           return String(val) === String(obj[q.value]);
        }
        
        const strVal = String(val).toLowerCase();
        if (q.exactMatch) {
          return strVal === q.value;  // Exact match (case-insensitive)
        }
        return strVal.includes(q.value);  // Partial match (current behavior)
      }
      return false;
    } else {
      // General value search across all shallow properties
      for (const k in obj) {
        if (Object.prototype.hasOwnProperty.call(obj, k)) {
          const val = obj[k];
          if (val !== null && val !== undefined && typeof val !== 'object') {
            const strVal = String(val).toLowerCase();
            if (q.exactMatch) {
              if (strVal === q.value) return true;
            } else {
              if (strVal.includes(q.value)) return true;
            }
          }
        }
      }
      return false;
    }
  });
}

function filterData(data, queries, path = "", depth = 0) {
  if (depth > 10) return undefined; // safety limit

  if (Array.isArray(data)) {
    const filteredArr = [];
    for (let i = 0; i < data.length; i++) {
      const item = data[i];
      if (item && typeof item === 'object') {
        if (matchesQueries(item, queries)) {
          filteredArr.push(item);
        } else {
          const childFilter = filterData(item, queries, path, depth + 1);
          if (childFilter !== undefined && (Object.keys(childFilter).length > 0 || (Array.isArray(childFilter) && childFilter.length > 0))) {
            filteredArr.push(childFilter);
          }
        }
      }
    }
    return filteredArr.length > 0 ? filteredArr : undefined;
  } else if (data && typeof data === 'object') {
    if (matchesQueries(data, queries)) {
      return data;
    }
    const filteredObj = {};
    let hasMatch = false;
    for (const key in data) {
      if (Object.prototype.hasOwnProperty.call(data, key)) {
        const item = data[key];
        if (item && typeof item === 'object') {
          const childFilter = filterData(item, queries, path, depth + 1);
          if (childFilter !== undefined && (Object.keys(childFilter).length > 0 || (Array.isArray(childFilter) && childFilter.length > 0))) {
            filteredObj[key] = childFilter;
            hasMatch = true;
          }
        }
      }
    }
    return hasMatch ? filteredObj : undefined;
  }
  return undefined;
}

function performSearch(query) {
  const rootData = window.originalParsedData || window.boardMetadata;
  if (!query || query.trim() === '') {
    renderTree(rootData);
    return;
  }

  const queries = parseQuery(query);
  const filtered = filterData(rootData, queries);
  
  if (filtered === undefined) {
    const container = document.getElementById('debug-tree-container');
    if (container) container.innerHTML = '<div class="debug-no-results">No results found matching the query.</div>';
  } else {
    renderTree(filtered);
    // Auto-expand the root node on search
    const rootToggle = document.querySelector('#debug-tree-container > .debug-tree-node > .debug-tree-toggle');
    if (rootToggle && rootToggle.textContent === '[+]') {
      rootToggle.click();
    }
  }
}

// Simple lazy-rendering DOM tree
function createNode(key, value, isRoot = false) {
  const nodeDiv = document.createElement('div');
  nodeDiv.className = 'debug-tree-node';

  const headerDiv = document.createElement('div');
  headerDiv.className = 'debug-tree-header';

  const isObject = value !== null && typeof value === 'object';
  const isArray = Array.isArray(value);

  const toggleSpan = document.createElement('span');
  toggleSpan.className = 'debug-tree-toggle';
  toggleSpan.textContent = isObject ? (isRoot ? '[-]' : '[+]') : '   ';
  headerDiv.appendChild(toggleSpan);

  const keySpan = document.createElement('span');
  keySpan.className = 'debug-tree-key';
  keySpan.textContent = key + ': ';
  headerDiv.appendChild(keySpan);

  const valueSpan = document.createElement('span');
  if (isObject) {
    const count = isArray ? value.length : Object.keys(value).length;
    valueSpan.className = 'debug-tree-summary';
    valueSpan.textContent = isArray ? `Array(${count})` : `Object(${count})`;
  } else {
    valueSpan.className = typeof value === 'number' ? 'debug-tree-value-number' : 'debug-tree-value-string';
    valueSpan.textContent = value === null ? 'null' : String(value);
  }
  headerDiv.appendChild(valueSpan);

  nodeDiv.appendChild(headerDiv);

  if (isObject) {
    const childrenDiv = document.createElement('div');
    childrenDiv.className = 'debug-tree-children';
    childrenDiv.style.display = isRoot ? 'block' : 'none';
    nodeDiv.appendChild(childrenDiv);

    let isExpanded = isRoot;

    const expandNode = () => {
      if (childrenDiv.children.length === 0) {
        // Render children lazily
        // Render max 500 children to prevent lockups, show '...' if more
        const keys = Object.keys(value);
        const maxKeys = 500;
        
        for (let i = 0; i < Math.min(keys.length, maxKeys); i++) {
          const childKey = keys[i];
          childrenDiv.appendChild(createNode(childKey, value[childKey]));
        }

        if (keys.length > maxKeys) {
           const moreDiv = document.createElement('div');
           moreDiv.className = 'debug-tree-node';
           moreDiv.innerHTML = `<span style="padding-left:20px; color:#888;">...and ${keys.length - maxKeys} more items</span>`;
           childrenDiv.appendChild(moreDiv);
        }
      }
      childrenDiv.style.display = 'block';
      toggleSpan.textContent = '[-]';
      isExpanded = true;
    };

    if (isRoot) {
      expandNode();
    }

    headerDiv.addEventListener('click', (e) => {
      if (e.target !== toggleSpan && e.target !== headerDiv && e.target !== keySpan && e.target !== valueSpan) return;
      if (isExpanded) {
        childrenDiv.style.display = 'none';
        toggleSpan.textContent = '[+]';
        isExpanded = false;
      } else {
        expandNode();
      }
    });
  }

  return nodeDiv;
}

function updateFlipState() {
  if (!mainGroup) return;

  const showTop = window.boardSideFlipped;
  const showBottom = !window.boardSideFlipped;
  
  if (showTop) {
     if (mainGroup.scale.x > 0) mainGroup.scale.x = -mainGroup.scale.x;
  } else {
     if (mainGroup.scale.x < 0) mainGroup.scale.x = Math.abs(mainGroup.scale.x);
  }

  function recurse(container) {
     if (container.isTopSideGroup !== undefined) {
         container.renderable = container.isTopSideGroup ? showTop : showBottom;
     }
     if (container.children) container.children.forEach(recurse);
  }
  
  Object.values(layerContainers).forEach(recurse);
  viaContainers.forEach(recurse);
  if (layerContainers[LAYER_IDS.PINS]) recurse(layerContainers[LAYER_IDS.PINS]);
  scheduleCulling();
}

function toggleFlipBoard(mouseGlobal) {
  if (!window.isFolded) return;
  let localBefore = null;
  let pivotGlobal = (flipAroundCursor && mouseGlobal) ? mouseGlobal : { x: window.innerWidth / 2, y: window.innerHeight / 2 };

  if (pivotGlobal && window.mainGroup) {
      localBefore = window.mainGroup.toLocal(pivotGlobal);
  }

  window.boardSideFlipped = !window.boardSideFlipped;
  updateFlipState();

  if (pivotGlobal && localBefore && window.mainGroup) {
     const globalAfter = window.mainGroup.toGlobal(localBefore);
     window.mainGroup.x += pivotGlobal.x - globalAfter.x;
     window.mainGroup.y += pivotGlobal.y - globalAfter.y;
  }
}

async function rebuildBoard() {
    if (!window.originalParsedData) return;

async function toggleBoardFolding() {
    if (!window.originalParsedData) return;

    saveSetting('toggles.boardFolding', window.isFolded);
    window.dispatchEvent(new CustomEvent('boardFoldToggled', { detail: window.isFolded }));
